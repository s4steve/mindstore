<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindstore — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0f5f8;
      --bg-card:    #ffffff;
      --border:     #c4d4e0;
      --text:       #0f2130;
      --text-2:     #3d6a82;
      --teal:       #0aa898;
      --teal-dim:   #088a7c;
      --red:        #cc3a3a;
      --display:    'Playfair Display', serif;
      --mono:       'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(10,168,152,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 90%, rgba(42,125,184,0.04) 0%, transparent 45%);
      background-attachment: fixed;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .login-card h1 {
      font-family: var(--display);
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 24px;
      text-align: center;
      color: var(--text);
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: var(--teal);
    }

    .login-btn {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      background: var(--teal);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .login-btn:hover { background: var(--teal-dim); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      margin-top: 14px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--red);
      background: rgba(204,58,58,0.08);
      border-radius: 4px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Mindstore</h1>
    <form id="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">Sign in</button>
      <div class="error" id="error-msg"></div>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.detail || 'Invalid credentials';
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Connection error';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
