<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindstore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f5f4f0;
      --bg-1:       #ffffff;
      --bg-2:       #edecea;
      --border:     #d8d6ce;
      --border-2:   #e6e4dc;
      --text:       #1a1918;
      --text-dim:   #6b6966;
      --text-dimmer:#b5b2ac;
      --accent:     #2563eb;
      --accent-dim: #1d4ed8;
      --green:      #16a34a;
      --red:        #dc2626;
      --font:       'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Progress flash ─────────────────────────────── */
    #flash {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease, opacity 0.3s ease;
      z-index: 100;
    }
    #flash.active { transform: scaleX(1); }
    #flash.fade   { opacity: 0; }

    /* ── Toast ─────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 20px; right: 20px;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      padding: 9px 14px;
      font-size: 11px;
      color: var(--green);
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
      z-index: 99;
    }
    #toast.error { border-left-color: var(--red); color: var(--red); }
    #toast.show  { opacity: 1; transform: translateY(0); }

    /* ── Header ────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-1);
      flex-shrink: 0;
    }

    .logo {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .logo em {
      color: var(--text-dim);
      font-style: normal;
      font-weight: 300;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dimmer);
      margin-right: 6px;
      transition: background 0.4s;
      vertical-align: middle;
    }
    .dot.on  { background: var(--green); }
    .dot.err { background: var(--red); }

    /* ── Main ──────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 44px 28px 36px;
    }

    /* ── Capture block ─────────────────────────────── */
    .label {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .label::before {
      content: '▸';
      color: var(--accent);
      font-size: 11px;
    }

    #typeLabel {
      color: var(--accent);
      transition: color 0.2s;
    }
    #typeLabel.is-note {
      color: var(--green);
    }

    textarea {
      width: 100%;
      min-height: 180px;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 300;
      line-height: 1.85;
      padding: 18px 22px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      caret-color: var(--accent);
    }
    textarea::placeholder {
      color: var(--text-dimmer);
      font-style: italic;
    }
    textarea:focus {
      background: var(--bg-2);
      border-color: var(--accent-dim);
      border-left-color: var(--accent);
    }

    /* ── Tags ──────────────────────────────────────── */
    .tags-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 10px;
      min-height: 32px;
    }

    .tags-prefix {
      font-size: 10px;
      color: var(--text-dimmer);
      letter-spacing: 0.06em;
      padding-top: 7px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tags-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      flex: 1;
      cursor: text;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: var(--font);
      font-size: 10px;
      padding: 2px 7px;
      letter-spacing: 0.04em;
      animation: chipIn 0.12s ease;
    }
    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    .chip-rm {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .chip-rm:hover { color: var(--red); }

    #tagInput {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      min-width: 140px;
      caret-color: var(--accent);
    }
    #tagInput::placeholder { color: var(--text-dimmer); }

    /* ── Actions ───────────────────────────────────── */
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
    }

    .hint {
      font-size: 10px;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
    }
    .hint kbd {
      display: inline-block;
      padding: 2px 5px;
      border: 1px solid var(--border);
      background: var(--bg-1);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 9px;
    }

    #captureBtn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: var(--font);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 10px 26px;
      cursor: pointer;
      transition: background 0.12s, transform 0.08s;
    }
    #captureBtn:hover:not(:disabled) { background: #e8c060; }
    #captureBtn:active:not(:disabled) { transform: scale(0.97); }
    #captureBtn:disabled {
      background: var(--text-dimmer);
      color: #000;
      cursor: not-allowed;
    }

    /* ── Char counter ──────────────────────────────── */
    .char-counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 5px;
    }

    .char-counter {
      font-size: 10px;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .char-counter.warn { color: var(--red); }

    .upload-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #uploadBtn {
      background: none;
      border: none;
      color: var(--text-dimmer);
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 0.06em;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }
    #uploadBtn:hover { color: var(--accent); }

    .file-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--green);
      font-size: 10px;
      letter-spacing: 0.04em;
      padding: 2px 7px;
    }

    #clearFile {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    #clearFile:hover { color: var(--red); }

    /* ── Divider ───────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 40px 0 18px;
    }
    .divider span {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Recent list ───────────────────────────────── */
    #recentList {
      display: flex;
      flex-direction: column;
    }

    .r-item {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 16px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border-2);
      align-items: start;
      animation: itemIn 0.2s ease both;
    }
    @keyframes itemIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .r-time {
      font-size: 9px;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
      padding-top: 2px;
      text-align: right;
    }

    .r-content {
      font-size: 12px;
      font-weight: 300;
      color: var(--text-dim);
      line-height: 1.65;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .r-tags {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .r-tag {
      font-size: 9px;
      color: var(--accent-dim);
      letter-spacing: 0.04em;
    }
    .r-tag::before { content: '#'; }

    .r-empty {
      font-size: 11px;
      color: var(--text-dimmer);
      font-style: italic;
      padding: 14px 0;
    }

    /* ── Footer ────────────────────────────────────── */
    footer {
      padding: 11px 28px;
      border-top: 1px solid var(--border);
      background: var(--bg-1);
      font-size: 10px;
      color: var(--text-dimmer);
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* ── Search ────────────────────────────────────── */
    .search-row {
      display: flex;
      gap: 10px;
    }

    #searchInput {
      flex: 1;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-left: 2px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 300;
      padding: 10px 16px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      caret-color: var(--accent);
    }
    #searchInput::placeholder {
      color: var(--text-dimmer);
      font-style: italic;
    }
    #searchInput:focus {
      background: var(--bg-2);
      border-color: var(--border);
      border-left-color: var(--accent);
    }

    #searchBtn {
      background: var(--bg-2);
      color: var(--text-dim);
      border: 1px solid var(--border);
      font-family: var(--font);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    #searchBtn:hover:not(:disabled) { color: var(--text); border-color: var(--accent-dim); }
    #searchBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    .s-item {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 16px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border-2);
      align-items: start;
      animation: itemIn 0.2s ease both;
    }

    .s-sim {
      font-size: 10px;
      letter-spacing: 0.02em;
      color: var(--accent);
      text-align: right;
      padding-top: 2px;
    }

    .s-meta {
      display: flex;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 3px;
    }

    .s-type {
      font-size: 9px;
      color: var(--text-dimmer);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .s-empty {
      font-size: 11px;
      color: var(--text-dimmer);
      font-style: italic;
      padding: 14px 0;
    }

    /* ── Scrollbar ─────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

<div id="flash"></div>
<div id="toast"></div>

<header>
  <div class="logo">MIND<em>STORE</em></div>
  <div class="header-meta">
    <span><span class="dot" id="dot"></span><span id="connStatus">connecting…</span></span>
    <span id="clock"></span>
  </div>
</header>

<main>
  <div class="label">capture <span id="typeLabel">thought</span></div>

  <textarea
    id="thought"
    placeholder="What's on your mind…"
    autofocus
    spellcheck="false"
    maxlength="50000"
  ></textarea>

  <div class="char-counter-row">
    <div class="char-counter" id="charCount">0 / 50,000</div>
    <div class="upload-area">
      <span id="fileBadge" class="file-badge" style="display:none">
        <span id="fileName"></span>
        <button id="clearFile" title="clear">✕</button>
      </span>
      <button id="uploadBtn">↑ upload .txt</button>
      <input id="fileInput" type="file" accept=".txt,text/plain" style="display:none">
    </div>
  </div>

  <div class="tags-row">
    <span class="tags-prefix">tags →</span>
    <div class="tags-inner" id="tagsInner">
      <input
        id="tagInput"
        type="text"
        placeholder="add tag, press enter or comma"
        autocomplete="off"
        spellcheck="false"
      >
    </div>
  </div>

  <div class="actions">
    <span class="hint"><kbd>⌘</kbd> / <kbd>Ctrl</kbd> + <kbd>↵</kbd> to capture</span>
    <button id="captureBtn">Capture</button>
  </div>

  <div class="divider"><span>search</span></div>

  <div class="search-row">
    <input
      id="searchInput"
      type="text"
      placeholder="search your thoughts…"
      autocomplete="off"
      spellcheck="false"
    >
    <button id="searchBtn">Search</button>
  </div>

  <div id="searchResults"></div>

  <div class="divider"><span>recent</span></div>

  <div id="recentList"><div class="r-empty">loading…</div></div>
</main>

<footer>
  <span>mindstore</span>
  <span id="footerCount">—</span>
</footer>

<script>
  // ── Refs ───────────────────────────────────────────────────────────
  const thoughtEl   = document.getElementById('thought');
  const tagInputEl  = document.getElementById('tagInput');
  const tagsInner   = document.getElementById('tagsInner');
  const captureBtn  = document.getElementById('captureBtn');
  const recentList  = document.getElementById('recentList');
  const dotEl       = document.getElementById('dot');
  const connEl      = document.getElementById('connStatus');
  const flashEl     = document.getElementById('flash');
  const toastEl     = document.getElementById('toast');
  const charCountEl = document.getElementById('charCount');
  const footerCount = document.getElementById('footerCount');
  const typeLabel   = document.getElementById('typeLabel');
  const fileInput   = document.getElementById('fileInput');
  const uploadBtn   = document.getElementById('uploadBtn');
  const fileBadge   = document.getElementById('fileBadge');
  const fileNameEl  = document.getElementById('fileName');
  const clearFileBtn = document.getElementById('clearFile');

  // ── Type detection (mirrors backend chunker logic) ─────────────────
  function detectType(content) {
    const paragraphs = content.split('\n\n').filter(p => p.trim().length >= 50);
    if (paragraphs.length >= 2) return 'note';
    const wordCount = content.trim().split(/\s+/).filter(Boolean).length;
    if (wordCount > 500) return 'note';
    return 'thought';
  }

  function updateTypeLabel(content) {
    const type = detectType(content);
    typeLabel.textContent = type;
    typeLabel.classList.toggle('is-note', type === 'note');
  }

  // ── State ──────────────────────────────────────────────────────────
  const tags = [];
  let busy = false;
  let toastTimer = null;
  let isFileUpload = false;

  // ── Clock ──────────────────────────────────────────────────────────
  const clockEl = document.getElementById('clock');
  function tick() {
    clockEl.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
  }
  tick();
  setInterval(tick, 1000);

  // ── Char counter ───────────────────────────────────────────────────
  thoughtEl.addEventListener('input', () => {
    const n = thoughtEl.value.length;
    charCountEl.textContent = `${n.toLocaleString()} / 50,000`;
    charCountEl.classList.toggle('warn', n > 45000);
    updateTypeLabel(thoughtEl.value);
  });

  // ── Tags ───────────────────────────────────────────────────────────
  function addTag(raw) {
    const t = raw.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '').slice(0, 40);
    if (!t || tags.includes(t) || tags.length >= 20) return;
    tags.push(t);
    renderTags();
  }

  function removeTag(t) {
    const i = tags.indexOf(t);
    if (i !== -1) { tags.splice(i, 1); renderTags(); }
  }

  function renderTags() {
    tagsInner.querySelectorAll('.chip').forEach(el => el.remove());
    tags.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.innerHTML = `${esc(t)}<button class="chip-rm" aria-label="remove ${t}">✕</button>`;
      chip.querySelector('.chip-rm').addEventListener('click', () => removeTag(t));
      tagsInner.insertBefore(chip, tagInputEl);
    });
  }

  tagInputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      addTag(tagInputEl.value);
      tagInputEl.value = '';
    } else if (e.key === 'Backspace' && !tagInputEl.value && tags.length) {
      removeTag(tags[tags.length - 1]);
    }
  });
  tagInputEl.addEventListener('blur', () => {
    if (tagInputEl.value.trim()) { addTag(tagInputEl.value); tagInputEl.value = ''; }
  });
  tagsInner.addEventListener('click', e => {
    if (e.target === tagsInner) tagInputEl.focus();
  });

  // ── Flash ──────────────────────────────────────────────────────────
  function flash() {
    flashEl.classList.remove('active', 'fade');
    void flashEl.offsetWidth;
    flashEl.classList.add('active');
    setTimeout(() => flashEl.classList.add('fade'), 350);
    setTimeout(() => flashEl.classList.remove('active', 'fade'), 700);
  }

  // ── Toast ──────────────────────────────────────────────────────────
  function toast(msg, type = '') {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.className = `show ${type}`;
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
  }

  // ── File upload ────────────────────────────────────────────────────
  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      thoughtEl.value = e.target.result;
      isFileUpload = true;
      fileNameEl.textContent = file.name;
      fileBadge.style.display = 'inline-flex';
      const n = thoughtEl.value.length;
      charCountEl.textContent = `${n.toLocaleString()} / 50,000`;
      charCountEl.classList.toggle('warn', n > 45000);
      typeLabel.textContent = 'note';
      typeLabel.classList.add('is-note');
      thoughtEl.focus();
    };
    reader.readAsText(file);
    fileInput.value = '';
  });

  function clearFile() {
    isFileUpload = false;
    fileBadge.style.display = 'none';
    fileNameEl.textContent = '';
    updateTypeLabel(thoughtEl.value);
  }

  clearFileBtn.addEventListener('click', clearFile);

  // ── Capture ────────────────────────────────────────────────────────
  async function capture() {
    const content = thoughtEl.value.trim();
    if (!content || busy) return;

    // Flush any pending tag
    if (tagInputEl.value.trim()) { addTag(tagInputEl.value); tagInputEl.value = ''; }

    busy = true;
    captureBtn.disabled = true;
    captureBtn.textContent = '…';

    try {
      const content_type = isFileUpload ? 'note' : detectType(content);
      const res = await fetch('/api/ingest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content, content_type, tags: [...tags] }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      flash();
      toast(`captured as ${content_type} →`);
      thoughtEl.value = '';
      charCountEl.textContent = '0 / 50,000';
      clearFile();
      updateTypeLabel('');
      tags.length = 0;
      renderTags();
      tagInputEl.value = '';
      thoughtEl.focus();
      loadRecent();
    } catch (err) {
      toast(`error: ${err.message}`, 'error');
    } finally {
      busy = false;
      captureBtn.disabled = false;
      captureBtn.textContent = 'Capture';
    }
  }

  captureBtn.addEventListener('click', capture);
  thoughtEl.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); capture(); }
  });

  // ── Recent ─────────────────────────────────────────────────────────
  function relTime(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'just now';
    if (m < 60) return `${m}m`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h`;
    return `${Math.floor(h / 24)}d`;
  }

  async function loadRecent() {
    try {
      const res = await fetch('/api/recent?limit=5');
      if (!res.ok) throw new Error();
      const data = await res.json();

      dotEl.className = 'dot on';
      connEl.textContent = 'connected';

      if (!data.length) {
        recentList.innerHTML = '<div class="r-empty">no captures yet</div>';
        footerCount.textContent = '0 entries';
        return;
      }

      recentList.innerHTML = '';
      data.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'r-item';
        el.style.animationDelay = `${i * 35}ms`;
        const tagsHtml = (item.tags || [])
          .map(t => `<span class="r-tag">${esc(t)}</span>`)
          .join('');
        el.innerHTML = `
          <div class="r-time">${relTime(item.created_at)}</div>
          <div>
            <div class="r-content">${esc(item.content)}</div>
            ${tagsHtml ? `<div class="r-tags">${tagsHtml}</div>` : ''}
          </div>`;
        recentList.appendChild(el);
      });

      footerCount.textContent = `${data.length} shown`;
    } catch {
      dotEl.className = 'dot err';
      connEl.textContent = 'offline';
      recentList.innerHTML = '<div class="r-empty">could not reach api</div>';
    }
  }

  // ── Utility ────────────────────────────────────────────────────────
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ── Search ─────────────────────────────────────────────────────────
  const searchInputEl  = document.getElementById('searchInput');
  const searchBtnEl    = document.getElementById('searchBtn');
  const searchResults  = document.getElementById('searchResults');
  let searching = false;

  async function doSearch() {
    const q = searchInputEl.value.trim();
    if (!q || searching) return;

    searching = true;
    searchBtnEl.disabled = true;
    searchBtnEl.textContent = '…';
    searchResults.innerHTML = '<div class="s-empty">searching…</div>';

    try {
      const params = new URLSearchParams({ q, limit: 10 });
      const res = await fetch(`/api/search?${params}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (!data.length) {
        searchResults.innerHTML = '<div class="s-empty">no results found</div>';
        return;
      }

      searchResults.innerHTML = '';
      data.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 's-item';
        el.style.animationDelay = `${i * 30}ms`;
        const simPct = Math.round(item.similarity * 100);
        const tagsHtml = (item.tags || [])
          .map(t => `<span class="r-tag">${esc(t)}</span>`)
          .join('');
        el.innerHTML = `
          <div class="s-sim">${simPct}%</div>
          <div>
            <div class="s-meta">
              <span class="s-type">${esc(item.content_type)}</span>
              <span class="r-time">${relTime(item.created_at)}</span>
            </div>
            <div class="r-content">${esc(item.content)}</div>
            ${tagsHtml ? `<div class="r-tags">${tagsHtml}</div>` : ''}
          </div>`;
        searchResults.appendChild(el);
      });
    } catch (err) {
      searchResults.innerHTML = `<div class="s-empty">error: ${esc(err.message)}</div>`;
    } finally {
      searching = false;
      searchBtnEl.disabled = false;
      searchBtnEl.textContent = 'Search';
    }
  }

  searchBtnEl.addEventListener('click', doSearch);
  searchInputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
  });
  searchInputEl.addEventListener('input', () => {
    if (!searchInputEl.value.trim()) searchResults.innerHTML = '';
  });

  // ── Init ───────────────────────────────────────────────────────────
  loadRecent();
  setInterval(loadRecent, 30000);
</script>
</body>
</html>
