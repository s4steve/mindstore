<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts — Mindstore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#f5f4f0; --bg-1:#ffffff; --bg-2:#edecea;
      --border:#d8d6ce; --border-2:#e6e4dc;
      --text:#1a1918; --text-dim:#6b6966; --text-dimmer:#b5b2ac;
      --accent:#2563eb; --accent-dim:#1d4ed8;
      --green:#16a34a; --red:#dc2626; --yellow:#d97706;
      --font:'JetBrains Mono', monospace;
    }
    html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px; line-height:1.6; -webkit-font-smoothing:antialiased; }
    body { display:flex; flex-direction:column; min-height:100vh; }

    #toast { position:fixed; bottom:20px; right:20px; background:var(--bg-1); border:1px solid var(--border); border-left:3px solid var(--green); padding:9px 14px; font-size:11px; color:var(--green); letter-spacing:.04em; opacity:0; transform:translateY(6px); transition:opacity .18s,transform .18s; pointer-events:none; z-index:99; }
    #toast.error { border-left-color:var(--red); color:var(--red); }
    #toast.show  { opacity:1; transform:translateY(0); }

    header { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; border-bottom:1px solid var(--border); background:var(--bg-1); flex-shrink:0; }
    .logo { font-size:11px; font-weight:600; letter-spacing:.18em; color:var(--accent); text-transform:uppercase; }
    .logo em { color:var(--text-dim); font-style:normal; font-weight:300; }

    main { flex:1; max-width:860px; width:100%; margin:0 auto; padding:36px 28px; }

    .toolbar { display:flex; gap:10px; margin-bottom:20px; align-items:center; flex-wrap:wrap; }
    .search-input { flex:1; min-width:180px; background:var(--bg-1); border:1px solid var(--border); border-left:2px solid var(--border); color:var(--text); font-family:var(--font); font-size:12px; padding:8px 12px; outline:none; transition:border-color .15s; }
    .search-input:focus { border-left-color:var(--accent); background:var(--bg-2); }

    .add-form { background:var(--bg-1); border:1px solid var(--border); border-left:2px solid var(--accent); padding:18px 20px; margin-bottom:24px; }
    .form-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
    .form-row:last-child { margin-bottom:0; }
    input[type=text], textarea.notes-input {
      background:var(--bg); border:1px solid var(--border); color:var(--text);
      font-family:var(--font); font-size:12px; padding:7px 10px; outline:none;
      transition:border-color .15s;
    }
    input[type=text]:focus, textarea.notes-input:focus { border-color:var(--accent); background:var(--bg-2); }
    textarea.notes-input { width:100%; min-height:60px; resize:vertical; }
    .input-name { flex:1; min-width:160px; }
    .input-sm   { width:160px; }

    .btn { background:var(--accent); color:#000; border:none; font-family:var(--font); font-size:10px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; padding:8px 20px; cursor:pointer; transition:background .12s; }
    .btn:hover { background:var(--accent-dim); }
    .btn-sm { padding:4px 10px; font-size:9px; }
    .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-dim); }
    .btn-ghost:hover { background:var(--bg-2); border-color:var(--accent); color:var(--accent); }
    .btn-danger { background:transparent; border:1px solid var(--border); color:var(--text-dimmer); }
    .btn-danger:hover { background:var(--red); border-color:var(--red); color:#fff; }
    .btn-log { background:transparent; border:1px solid var(--green); color:var(--green); }
    .btn-log:hover { background:var(--green); color:#fff; }

    .contact-item { background:var(--bg-1); border:1px solid var(--border-2); border-left:3px solid var(--border); padding:12px 16px; margin-bottom:8px; }
    .contact-item.stale { border-left-color:var(--yellow); }
    .contact-name { font-size:13px; font-weight:500; }
    .contact-meta { font-size:10px; color:var(--text-dim); letter-spacing:.04em; margin-top:3px; display:flex; gap:10px; flex-wrap:wrap; }
    .contact-notes { font-size:11px; color:var(--text-dim); margin-top:6px; white-space:pre-wrap; max-height:80px; overflow:hidden; position:relative; }
    .contact-notes.expanded { max-height:none; }
    .show-more { font-size:10px; color:var(--accent); cursor:pointer; display:inline-block; margin-top:2px; }
    .stale-label { color:var(--yellow); font-weight:500; }
    .never-label  { color:var(--red); }
    .contact-actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; align-items:center; }
    .log-input-row { display:flex; gap:8px; margin-top:8px; }
    .log-input-row input { flex:1; }
    .edit-form { margin-top:12px; padding-top:12px; border-top:1px solid var(--border-2); display:none; }
    .edit-form.open { display:block; }

    .empty { font-size:11px; color:var(--text-dimmer); font-style:italic; padding:20px 0; }

    footer { padding:11px 28px; border-top:1px solid var(--border); background:var(--bg-1); font-size:10px; color:var(--text-dimmer); letter-spacing:.05em; }
    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); }
  </style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="logo">MIND<em>STORE</em></div>
</header>

<main>
  <div class="add-form">
    <div class="form-row">
      <input type="text" class="input-name" id="newName" placeholder="Name…" autocomplete="off">
      <input type="text" class="input-sm" id="newEmail" placeholder="Email" autocomplete="off">
      <input type="text" class="input-sm" id="newPhone" placeholder="Phone" autocomplete="off">
      <input type="text" class="input-sm" id="newCompany" placeholder="Company" autocomplete="off">
    </div>
    <div class="form-row">
      <textarea class="notes-input" id="newNotes" placeholder="Notes (optional)…"></textarea>
    </div>
    <div class="form-row">
      <button class="btn" id="addBtn">+ Add Contact</button>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="search by name…" autocomplete="off">
    <button class="btn btn-ghost btn-sm" id="filterStaleBtn">reach out needed</button>
    <button class="btn btn-ghost btn-sm active" id="filterAllBtn">all</button>
  </div>

  <div id="contactList"><div class="empty">loading…</div></div>
</main>

<footer id="footerCount">—</footer>

<script>
  const listEl  = document.getElementById('contactList');
  const toastEl = document.getElementById('toast');
  let toastTimer = null;
  let allContacts = [];
  let filterStale = false;

  function toast(msg, type = '') {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.className = `show ${type}`;
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function daysSince(iso) {
    if (!iso) return null;
    return Math.floor((Date.now() - new Date(iso)) / 86400000);
  }

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api' + path, opts);
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || `HTTP ${res.status}`); }
    return res.status === 204 ? null : res.json();
  }

  async function loadContacts() {
    try {
      allContacts = await api('GET', '/contacts');
      renderFiltered();
    } catch (e) {
      listEl.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`;
    }
  }

  function renderFiltered() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let contacts = allContacts;
    if (q) contacts = contacts.filter(c => c.name.toLowerCase().includes(q));
    if (filterStale) contacts = contacts.filter(c => !c.last_contact_at || daysSince(c.last_contact_at) >= 14);
    render(contacts);
  }

  function render(contacts) {
    document.getElementById('footerCount').textContent = `${contacts.length} contact${contacts.length !== 1 ? 's' : ''}`;
    if (!contacts.length) { listEl.innerHTML = '<div class="empty">no contacts</div>'; return; }
    listEl.innerHTML = '';
    contacts.forEach(c => {
      const ds = daysSince(c.last_contact_at);
      const stale = ds === null || ds >= 14;
      const el = document.createElement('div');
      el.className = `contact-item${stale ? ' stale' : ''}`;
      el.dataset.id = c.id;
      const lastLabel = ds === null
        ? '<span class="never-label">never contacted</span>'
        : ds === 0 ? 'today'
        : `<span class="${ds >= 14 ? 'stale-label' : ''}">${ds}d ago</span>`;
      const details = [c.email, c.phone, c.company].filter(Boolean).map(v => esc(v)).join(' · ');
      el.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:start;gap:10px">
          <div style="flex:1">
            <div class="contact-name">${esc(c.name)}</div>
            <div class="contact-meta">
              ${details ? `<span>${details}</span>` : ''}
              <span>last: ${lastLabel}</span>
              ${(c.tags||[]).map(t=>`<span>#${esc(t)}</span>`).join('')}
            </div>
            ${c.notes ? `<div class="contact-notes" id="notes-${c.id}">${esc(c.notes)}</div>` : ''}
          </div>
          <div class="contact-actions">
            <button class="btn btn-sm btn-log log-btn" data-id="${c.id}">+ log</button>
            <button class="btn btn-sm btn-ghost edit-btn" data-id="${c.id}">edit</button>
            <button class="btn btn-sm btn-danger delete-btn" data-id="${c.id}">✕</button>
          </div>
        </div>
        <div class="log-input-row" id="logRow-${c.id}" style="display:none">
          <input type="text" class="log-input" placeholder="What happened?…" autocomplete="off">
          <button class="btn btn-sm btn-log log-submit" data-id="${c.id}">save</button>
          <button class="btn btn-sm btn-ghost log-cancel" data-id="${c.id}">cancel</button>
        </div>
        <div class="edit-form" id="edit-${c.id}">
          <div class="form-row">
            <input type="text" class="input-name e-name" value="${esc(c.name)}" placeholder="Name">
            <input type="text" class="input-sm e-email" value="${esc(c.email||'')}" placeholder="Email">
            <input type="text" class="input-sm e-phone" value="${esc(c.phone||'')}" placeholder="Phone">
            <input type="text" class="input-sm e-company" value="${esc(c.company||'')}" placeholder="Company">
          </div>
          <div class="form-row"><textarea class="notes-input e-notes" placeholder="Notes…">${esc(c.notes||'')}</textarea></div>
          <div class="form-row">
            <button class="btn btn-sm save-btn" data-id="${c.id}">Save</button>
            <button class="btn btn-sm btn-ghost cancel-btn" data-id="${c.id}">Cancel</button>
          </div>
        </div>`;

      // show-more for notes
      const notesEl = el.querySelector(`#notes-${c.id}`);
      if (notesEl && notesEl.scrollHeight > 86) {
        const sm = document.createElement('span');
        sm.className = 'show-more';
        sm.textContent = 'show more';
        sm.addEventListener('click', () => {
          notesEl.classList.toggle('expanded');
          sm.textContent = notesEl.classList.contains('expanded') ? 'show less' : 'show more';
        });
        notesEl.insertAdjacentElement('afterend', sm);
      }

      listEl.appendChild(el);
    });

    listEl.querySelectorAll('.log-btn').forEach(btn => btn.addEventListener('click', () => {
      const row = document.getElementById(`logRow-${btn.dataset.id}`);
      row.style.display = row.style.display === 'none' ? 'flex' : 'none';
      if (row.style.display === 'flex') row.querySelector('.log-input').focus();
    }));
    listEl.querySelectorAll('.log-cancel').forEach(btn => btn.addEventListener('click', () => {
      document.getElementById(`logRow-${btn.dataset.id}`).style.display = 'none';
    }));
    listEl.querySelectorAll('.log-submit').forEach(btn => btn.addEventListener('click', async () => {
      const row = document.getElementById(`logRow-${btn.dataset.id}`);
      const note = row.querySelector('.log-input').value.trim();
      if (!note) return;
      try {
        await api('POST', `/contacts/${btn.dataset.id}/interaction`, { note });
        toast('interaction logged');
        loadContacts();
      } catch (e) { toast(e.message, 'error'); }
    }));
    listEl.querySelectorAll('.log-input').forEach(inp => inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') inp.closest('.log-input-row').querySelector('.log-submit').click();
    }));
    listEl.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', async () => {
      if (!confirm('Delete this contact?')) return;
      try { await api('DELETE', `/contacts/${btn.dataset.id}`); toast('deleted'); loadContacts(); }
      catch (e) { toast(e.message, 'error'); }
    }));
    listEl.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => {
      document.getElementById(`edit-${btn.dataset.id}`).classList.toggle('open');
    }));
    listEl.querySelectorAll('.cancel-btn').forEach(btn => btn.addEventListener('click', () => {
      document.getElementById(`edit-${btn.dataset.id}`).classList.remove('open');
    }));
    listEl.querySelectorAll('.save-btn').forEach(btn => btn.addEventListener('click', async () => {
      const form = document.getElementById(`edit-${btn.dataset.id}`);
      const body = {
        name:    form.querySelector('.e-name').value.trim(),
        email:   form.querySelector('.e-email').value.trim() || null,
        phone:   form.querySelector('.e-phone').value.trim() || null,
        company: form.querySelector('.e-company').value.trim() || null,
        notes:   form.querySelector('.e-notes').value.trim() || null,
      };
      try { await api('PUT', `/contacts/${btn.dataset.id}`, body); toast('saved'); loadContacts(); }
      catch (e) { toast(e.message, 'error'); }
    }));
  }

  document.getElementById('searchInput').addEventListener('input', renderFiltered);
  document.getElementById('filterStaleBtn').addEventListener('click', () => {
    filterStale = true;
    document.getElementById('filterStaleBtn').classList.add('active');
    document.getElementById('filterAllBtn').classList.remove('active');
    renderFiltered();
  });
  document.getElementById('filterAllBtn').addEventListener('click', () => {
    filterStale = false;
    document.getElementById('filterAllBtn').classList.add('active');
    document.getElementById('filterStaleBtn').classList.remove('active');
    renderFiltered();
  });

  document.getElementById('addBtn').addEventListener('click', async () => {
    const name = document.getElementById('newName').value.trim();
    if (!name) return;
    const body = {
      name,
      email:   document.getElementById('newEmail').value.trim() || null,
      phone:   document.getElementById('newPhone').value.trim() || null,
      company: document.getElementById('newCompany').value.trim() || null,
      notes:   document.getElementById('newNotes').value.trim() || null,
    };
    try {
      await api('POST', '/contacts', body);
      toast('contact added');
      ['newName','newEmail','newPhone','newCompany','newNotes'].forEach(id => { document.getElementById(id).value = ''; });
      loadContacts();
    } catch (e) { toast(e.message, 'error'); }
  });

  document.getElementById('newName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('addBtn').click();
  });

  loadContacts();
</script>
<script src="/nav.js"></script>
</body>
</html>
