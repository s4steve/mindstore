<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindstore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ---- capture page specifics ---- */
    .section-label .refined-badge {
      display: none; align-items: center; gap: 6px; margin-left: auto;
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--green-dim);
      border: 1px solid var(--green-glow); background: var(--green-bg);
      padding: 3px 11px; border-radius: var(--r-pill); font-style: normal;
      animation: chipIn 0.15s var(--ease);
    }
    .section-label .refined-badge.show { display: inline-flex; }
    #typeLabel { font-style: normal; color: var(--teal); transition: color 0.2s; }
    #typeLabel.is-note { color: var(--green); }

    /* capture card — the writing surface */
    .capture-card {
      background: var(--bg-card); border: 1px solid var(--border-sub);
      border-radius: var(--r-lg); box-shadow: var(--shadow-md);
      padding: 26px 28px 20px; position: relative; overflow: hidden;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    .capture-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--blue) 62%, var(--amber));
    }
    .capture-card:focus-within {
      border-color: var(--teal);
      box-shadow: var(--shadow-md), 0 0 0 4px var(--teal-glow);
    }

    #titleInput {
      width: 100%; margin-bottom: 14px; background: transparent;
      border: none; border-bottom: 1px solid var(--border-sub);
      color: var(--text); font-family: var(--display); font-size: 22px;
      font-weight: 500; padding: 0 0 12px; outline: none; caret-color: var(--teal);
    }
    #titleInput::placeholder { color: var(--text-3); font-style: italic; font-weight: 400; }

    #thought {
      width: 100%; min-height: 204px; background: transparent; border: none;
      color: var(--text); font-family: var(--mono); font-size: 14px;
      font-weight: 300; line-height: 1.9; resize: vertical; outline: none;
      caret-color: var(--teal);
    }
    #thought::placeholder { color: var(--text-3); font-style: italic; }

    .capture-meta {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-top: 18px; padding-top: 16px;
      border-top: 1px solid var(--border-sub);
    }
    .tags-row { display: flex; align-items: flex-start; gap: 10px; flex: 1; min-height: 30px; }
    .tags-prefix {
      font-size: 10px; color: var(--text-3); letter-spacing: 0.08em;
      text-transform: uppercase; padding-top: 6px; white-space: nowrap; flex-shrink: 0;
    }
    .tags-inner { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; flex: 1; cursor: text; }
    #tagInput {
      background: none; border: none; outline: none; color: var(--text);
      font-family: var(--mono); font-size: 11px; min-width: 140px; caret-color: var(--teal);
    }
    #tagInput::placeholder { color: var(--text-3); }
    .char-counter {
      font-size: 10px; color: var(--text-3); letter-spacing: 0.04em;
      padding-top: 6px; white-space: nowrap; flex-shrink: 0; transition: color 0.2s;
    }
    .char-counter.warn { color: var(--red); }

    .upload-area { display: flex; align-items: center; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    #uploadBtn {
      background: transparent; border: 1px solid var(--border); color: var(--text-3);
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 5px 14px; cursor: pointer; border-radius: var(--r-sm);
      transition: border-color 0.15s, color 0.15s;
    }
    #uploadBtn:hover { border-color: var(--teal); color: var(--teal); }
    .file-badge {
      display: inline-flex; align-items: center; gap: 6px; background: var(--blue-bg);
      border: 1px solid rgba(42,125,184,0.30); color: var(--blue-dim);
      font-size: 10px; padding: 3px 11px; border-radius: var(--r-pill);
    }
    #clearFile {
      background: none; border: none; color: rgba(42,125,184,0.55); font-size: 11px;
      cursor: pointer; padding: 0; line-height: 1; transition: color 0.12s;
    }
    #clearFile:hover { color: var(--red); }

    .actions { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 18px; flex-wrap: wrap; }
    .hint { font-size: 10px; color: var(--text-3); letter-spacing: 0.04em; }
    .hint kbd {
      display: inline-block; padding: 2px 6px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-2); font-family: var(--mono);
      font-size: 9px; border-radius: 4px;
    }
    .action-btns { display: flex; align-items: center; gap: 12px; }

    .search-row { display: flex; gap: 10px; }
    #searchInput { flex: 1; }
    #searchResults { margin-top: 12px; }
    #recentList { margin-top: 2px; }
  </style>
</head>
<body>
<div id="flash"></div>
<div id="toast"></div>

<div id="modal-overlay">
  <div id="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <div class="modal-meta">
        <span class="modal-type" id="modal-type"></span>
        <span id="modal-time"></span>
        <span id="modal-sim"></span>
      </div>
      <button id="modal-close" aria-label="close">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div id="modal-content"></div>
      <div class="modal-tags" id="modal-tags"></div>
    </div>
  </div>
</div>

<header>
  <div class="wordmark">Mind<em>store</em></div>
  <div class="header-right">
    <span>
      <span class="status-dot" id="dot"></span>
      <span id="connStatus">connecting</span>
    </span>
    <span id="clock"></span>
  </div>
</header>

<main>
  <div class="section-label reveal reveal-1">
    Capture <span id="typeLabel">thought</span>
    <span class="refined-badge" id="refinedBadge">&#x2713; refined &middot; review &amp; edit</span>
  </div>

  <div class="reveal reveal-2">
    <div class="capture-card">
      <input id="titleInput" type="text" placeholder="title (optional)" autocomplete="off" spellcheck="false" maxlength="200" style="display:none">

      <textarea id="thought" placeholder="What's on your mind&#x2026;" autofocus spellcheck="false" maxlength="50000"></textarea>

      <div class="capture-meta">
        <div class="tags-row">
          <span class="tags-prefix">tags</span>
          <div class="tags-inner" id="tagsInner">
            <input id="tagInput" type="text" placeholder="add tag, enter or comma" autocomplete="off" spellcheck="false">
          </div>
        </div>
        <span class="char-counter" id="charCount">0 / 50k</span>
      </div>

      <div class="upload-area">
        <span id="fileBadge" class="file-badge" style="display:none">
          <span id="fileName"></span>
          <button id="clearFile" title="clear">&#x2715;</button>
        </span>
        <button id="uploadBtn">&#x2191; upload .txt</button>
        <input id="fileInput" type="file" accept=".txt,text/plain" style="display:none">
      </div>
    </div>

    <div class="actions">
      <span class="hint"><kbd>&#x2318;</kbd>/<kbd>Ctrl</kbd>+<kbd>&#x23CE;</kbd> capture &middot; <kbd>&#x2318;</kbd>/<kbd>Ctrl</kbd>+<kbd>&#x21E7;</kbd>+<kbd>&#x23CE;</kbd> refine</span>
      <div class="action-btns">
        <button id="refineBtn" class="btn btn-ghost warm" title="Clean up with AI">&#x2728; Refine</button>
        <button id="captureBtn" class="btn btn-primary">Capture</button>
      </div>
    </div>
  </div>

  <div class="divider reveal reveal-3"><span>search</span></div>

  <div class="reveal reveal-4">
    <div class="search-row">
      <input id="searchInput" class="field" type="text" placeholder="Search your knowledge&#x2026;" autocomplete="off" spellcheck="false">
      <button id="searchBtn" class="btn btn-ghost blue">Search</button>
    </div>
    <div id="searchResults"></div>
  </div>

  <div class="divider reveal reveal-5"><span>recent</span></div>
  <div id="recentList" class="reveal reveal-5"><div class="r-empty">loading&#x2026;</div></div>
</main>

<footer>
  <span>mindstore</span>
  <span id="footerCount">&#x2014;</span>
</footer>

<script>
  const thoughtEl    = document.getElementById('thought');
  const tagInputEl   = document.getElementById('tagInput');
  const tagsInner    = document.getElementById('tagsInner');
  const captureBtn   = document.getElementById('captureBtn');
  const recentList   = document.getElementById('recentList');
  const dotEl        = document.getElementById('dot');
  const connEl       = document.getElementById('connStatus');
  const flashEl      = document.getElementById('flash');
  const toastEl      = document.getElementById('toast');
  const charCountEl  = document.getElementById('charCount');
  const footerCount  = document.getElementById('footerCount');
  const typeLabel    = document.getElementById('typeLabel');
  const fileInput    = document.getElementById('fileInput');
  const uploadBtn    = document.getElementById('uploadBtn');
  const fileBadge    = document.getElementById('fileBadge');
  const fileNameEl   = document.getElementById('fileName');
  const clearFileBtn = document.getElementById('clearFile');
  const refineBtn    = document.getElementById('refineBtn');
  const titleInput   = document.getElementById('titleInput');
  const refinedBadge = document.getElementById('refinedBadge');

  function detectType(content) {
    const paragraphs = content.split('\n\n').filter(p => p.trim().length >= 50);
    if (paragraphs.length >= 2) return 'note';
    if (content.trim().split(/\s+/).filter(Boolean).length > 500) return 'note';
    return 'thought';
  }
  function updateTypeLabel(content) {
    const type = detectType(content);
    typeLabel.textContent = type;
    typeLabel.classList.toggle('is-note', type === 'note');
  }

  const tags = [];
  let busy = false, toastTimer = null, isFileUpload = false;

  const clockEl = document.getElementById('clock');
  function tick() { clockEl.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false }); }
  tick(); setInterval(tick, 1000);

  thoughtEl.addEventListener('input', () => {
    const n = thoughtEl.value.length;
    charCountEl.textContent = n > 999 ? (n/1000).toFixed(1)+'k / 50k' : n+' / 50k';
    charCountEl.classList.toggle('warn', n > 45000);
    updateTypeLabel(thoughtEl.value);
  });

  function addTag(raw) {
    const t = raw.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '').slice(0, 40);
    if (!t || tags.includes(t) || tags.length >= 20) return;
    tags.push(t); renderTags();
  }
  function removeTag(t) { const i = tags.indexOf(t); if (i !== -1) { tags.splice(i,1); renderTags(); } }
  function renderTags() {
    tagsInner.querySelectorAll('.chip').forEach(el => el.remove());
    tags.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.innerHTML = esc(t) + '<button class="chip-rm" aria-label="remove">&#x2715;</button>';
      chip.querySelector('.chip-rm').addEventListener('click', () => removeTag(t));
      tagsInner.insertBefore(chip, tagInputEl);
    });
  }
  tagInputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(tagInputEl.value); tagInputEl.value = ''; }
    else if (e.key === 'Backspace' && !tagInputEl.value && tags.length) removeTag(tags[tags.length-1]);
  });
  tagInputEl.addEventListener('blur', () => { if (tagInputEl.value.trim()) { addTag(tagInputEl.value); tagInputEl.value = ''; } });
  tagsInner.addEventListener('click', e => { if (e.target === tagsInner) tagInputEl.focus(); });

  function flash() {
    flashEl.classList.remove('active','fade'); void flashEl.offsetWidth;
    flashEl.classList.add('active');
    setTimeout(() => flashEl.classList.add('fade'), 350);
    setTimeout(() => flashEl.classList.remove('active','fade'), 700);
  }
  function toast(msg, type='') {
    clearTimeout(toastTimer); toastEl.textContent = msg;
    toastEl.className = 'show ' + type;
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
  }

  uploadBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      thoughtEl.value = e.target.result; isFileUpload = true;
      fileNameEl.textContent = file.name; fileBadge.style.display = 'inline-flex';
      const n = thoughtEl.value.length;
      charCountEl.textContent = n+' / 50k'; charCountEl.classList.toggle('warn', n > 45000);
      typeLabel.textContent = 'note'; typeLabel.classList.add('is-note'); thoughtEl.focus();
    };
    reader.readAsText(file); fileInput.value = '';
  });
  function clearFile() { isFileUpload = false; fileBadge.style.display = 'none'; fileNameEl.textContent = ''; updateTypeLabel(thoughtEl.value); }
  clearFileBtn.addEventListener('click', clearFile);

  async function capture() {
    const content = thoughtEl.value.trim(); if (!content || busy) return;
    if (tagInputEl.value.trim()) { addTag(tagInputEl.value); tagInputEl.value = ''; }
    busy = true; captureBtn.disabled = true; captureBtn.textContent = '…';
    try {
      const content_type = isFileUpload ? 'note' : detectType(content);
      const title = titleInput.value.trim();
      const body = { content, content_type, tags: [...tags] };
      if (title) body.title = title;
      const res = await fetch('/api/ingest', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.detail || 'HTTP '+res.status); }
      flash(); toast('captured as '+content_type+' →');
      thoughtEl.value = ''; charCountEl.textContent = '0 / 50k'; clearFile(); updateTypeLabel('');
      tags.length = 0; renderTags(); tagInputEl.value = ''; resetRefined(); thoughtEl.focus(); loadRecent();
    } catch(err) { toast('error: '+err.message, 'error'); }
    finally { busy = false; captureBtn.disabled = false; captureBtn.textContent = 'Capture'; }
  }

  captureBtn.addEventListener('click', capture);

  function resetRefined() {
    titleInput.value = ''; titleInput.style.display = 'none';
    refinedBadge.classList.remove('show');
  }

  async function refine() {
    const content = thoughtEl.value.trim();
    if (!content || busy) return;
    busy = true; refineBtn.disabled = true; captureBtn.disabled = true;
    const prevLabel = refineBtn.innerHTML; refineBtn.innerHTML = '… refining';
    try {
      const content_type = isFileUpload ? 'note' : detectType(content);
      const res = await fetch('/api/refine', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content, content_type }),
      });
      if (res.status === 503) { toast('AI cleanup unavailable — capture as-is', 'error'); return; }
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.detail || 'HTTP '+res.status); }
      const data = await res.json();
      thoughtEl.value = data.content;
      const n = thoughtEl.value.length;
      charCountEl.textContent = n > 999 ? (n/1000).toFixed(1)+'k / 50k' : n+' / 50k';
      updateTypeLabel(thoughtEl.value);
      if (data.title) { titleInput.value = data.title; titleInput.style.display = 'block'; }
      (data.tags || []).forEach(addTag);
      refinedBadge.classList.add('show');
      flash(); toast('refined — review & edit, then capture');
      thoughtEl.focus();
    } catch(err) { toast('refine error: '+err.message, 'error'); }
    finally { busy = false; refineBtn.disabled = false; captureBtn.disabled = false; refineBtn.innerHTML = prevLabel; }
  }
  refineBtn.addEventListener('click', refine);

  thoughtEl.addEventListener('keydown', e => {
    if ((e.metaKey||e.ctrlKey) && e.key==='Enter') {
      e.preventDefault();
      if (e.shiftKey) refine(); else capture();
    }
  });

  function relTime(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff/60000);
    if (m < 1) return 'just now';
    if (m < 60) return m+'m';
    const h = Math.floor(m/60);
    if (h < 24) return h+'h';
    return Math.floor(h/24)+'d';
  }

  async function loadRecent() {
    try {
      const res = await fetch('/api/recent?limit=5');
      if (!res.ok) throw new Error();
      const data = await res.json();
      dotEl.className = 'status-dot on'; connEl.textContent = 'connected';
      if (!data.length) { recentList.innerHTML = '<div class="r-empty">no captures yet</div>'; footerCount.textContent = '0 entries'; return; }
      recentList.innerHTML = '';
      data.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'r-item'; el.style.animationDelay = (i*35)+'ms';
        const tagsHtml = (item.tags||[]).map(t => '<span class="r-tag">'+esc(t)+'</span>').join('');
        el.innerHTML = '<div class="r-time">'+relTime(item.created_at)+'</div><div><div class="r-content">'+esc(item.content)+'</div>'+(tagsHtml?'<div class="r-tags">'+tagsHtml+'</div>':'')+'</div>';
        el.style.cursor = 'pointer';
        el.addEventListener('click', () => openModal(item, null));
        recentList.appendChild(el);
      });
      footerCount.textContent = data.length+' shown';
    } catch { dotEl.className = 'status-dot err'; connEl.textContent = 'offline'; recentList.innerHTML = '<div class="r-empty">could not reach api</div>'; }
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  const searchInputEl = document.getElementById('searchInput');
  const searchBtnEl   = document.getElementById('searchBtn');
  const searchResults = document.getElementById('searchResults');
  let searching = false;

  async function doSearch() {
    const q = searchInputEl.value.trim(); if (!q || searching) return;
    searching = true; searchBtnEl.disabled = true; searchBtnEl.textContent = '…';
    searchResults.innerHTML = '<div class="s-empty">searching…</div>';
    try {
      const res = await fetch('/api/search?' + new URLSearchParams({ q, limit: 10 }));
      if (!res.ok) throw new Error('HTTP '+res.status);
      const data = await res.json();
      if (!data.length) { searchResults.innerHTML = '<div class="s-empty">no results found</div>'; return; }
      searchResults.innerHTML = '';
      data.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 's-item'; el.style.animationDelay = (i*30)+'ms';
        const simPct = Math.round(item.similarity * 100);
        const tagsHtml = (item.tags||[]).map(t => '<span class="r-tag">'+esc(t)+'</span>').join('');
        el.innerHTML = '<div class="s-sim">'+simPct+'%</div><div><div class="s-meta"><span class="s-type">'+esc(item.content_type)+'</span><span class="r-time">'+relTime(item.created_at)+'</span></div><div class="r-content">'+esc(item.content)+'</div>'+(tagsHtml?'<div class="r-tags">'+tagsHtml+'</div>':'')+'</div>';
        el.addEventListener('click', () => openModal(item, simPct));
        searchResults.appendChild(el);
      });
    } catch(err) { searchResults.innerHTML = '<div class="s-empty">error: '+esc(err.message)+'</div>'; }
    finally { searching = false; searchBtnEl.disabled = false; searchBtnEl.textContent = 'Search'; }
  }

  searchBtnEl.addEventListener('click', doSearch);
  searchInputEl.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); doSearch(); } });
  searchInputEl.addEventListener('input', () => { if (!searchInputEl.value.trim()) searchResults.innerHTML = ''; });

  const modalOverlay = document.getElementById('modal-overlay');
  const modalType    = document.getElementById('modal-type');
  const modalTime    = document.getElementById('modal-time');
  const modalSim     = document.getElementById('modal-sim');
  const modalContent = document.getElementById('modal-content');
  const modalTags    = document.getElementById('modal-tags');
  const modalClose   = document.getElementById('modal-close');

  async function openModal(item, simPct) {
    modalType.textContent = item.content_type; modalTime.textContent = relTime(item.created_at);
    modalSim.textContent = simPct != null ? simPct+'% match' : '';
    modalContent.textContent = item.content;
    modalTags.innerHTML = (item.tags||[]).map(t => '<span class="r-tag">'+esc(t)+'</span>').join('');
    modalTags.style.display = item.tags && item.tags.length ? 'flex' : 'none';
    modalOverlay.classList.add('open'); document.addEventListener('keydown', onModalKey);

    if (['thought', 'note', 'event'].includes(item.content_type)) {
      try {
        const resp = await fetch('/api/thoughts/' + item.id);
        if (resp.ok) { const full = await resp.json(); modalContent.textContent = full.content; }
      } catch (e) { /* keep preview on error */ }
    }
  }
  function closeModal() { modalOverlay.classList.remove('open'); document.removeEventListener('keydown', onModalKey); }
  function onModalKey(e) { if (e.key==='Escape') closeModal(); }
  modalClose.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', e => { if (e.target===modalOverlay) closeModal(); });

  loadRecent(); setInterval(loadRecent, 30000);
</script>
<script src="/nav.js"></script>
</body>
</html>
