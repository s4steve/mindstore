<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home &#x2014; Mindstore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ---- add form ---- */
    .add-form {
      position: relative; overflow: hidden;
      background: var(--bg-card); border: 1px solid var(--border-sub);
      border-radius: var(--r-lg); box-shadow: var(--shadow-md);
      padding: 22px 24px; margin-bottom: 28px;
    }
    .add-form::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--blue) 62%, var(--amber));
    }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .form-row:last-child { margin-bottom: 0; }
    input[type=text], input[type=datetime-local], textarea.notes-input {
      background: var(--bg-2); border: 1px solid var(--border); color: var(--text);
      font-family: var(--mono); font-size: 12px; padding: 9px 12px; outline: none;
      border-radius: var(--r-sm);
      transition: border-color .18s var(--ease), box-shadow .18s var(--ease), background .18s var(--ease);
    }
    input[type=text]:focus, input[type=datetime-local]:focus, textarea.notes-input:focus {
      border-color: var(--teal); background: var(--bg-card); box-shadow: 0 0 0 3px var(--teal-glow);
    }
    input::placeholder, textarea::placeholder { color: var(--text-3); }
    .input-name { flex: 1; min-width: 200px; }
    textarea.notes-input { width: 100%; min-height: 62px; resize: vertical; line-height: 1.6; }

    /* ---- buttons ---- */
    .btn {
      background: linear-gradient(135deg, var(--teal), var(--teal-dim)); color: #fff;
      border: 1px solid transparent; font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: .12em; text-transform: uppercase; padding: 9px 22px; cursor: pointer;
      border-radius: var(--r); box-shadow: 0 3px 12px var(--teal-glow);
      transition: box-shadow .16s var(--ease), background .16s var(--ease), color .16s var(--ease), border-color .16s var(--ease), transform .08s var(--ease);
    }
    .btn:hover { box-shadow: 0 5px 18px var(--teal-glow), 0 0 0 1px var(--teal); }
    .btn:active { transform: scale(.97); }
    .btn-sm { padding: 5px 12px; font-size: 9px; box-shadow: none; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-2); box-shadow: none; }
    .btn-ghost:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); box-shadow: none; }
    .btn-done { background: transparent; border: 1px solid rgba(24,165,93,0.4); color: var(--green-dim); box-shadow: none; }
    .btn-done:hover { background: var(--green-bg); border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
    .btn-danger { background: transparent; border: 1px solid var(--border); color: var(--text-3); box-shadow: none; }
    .btn-danger:hover { background: rgba(204,58,58,0.1); border-color: var(--red); color: var(--red); box-shadow: none; }

    /* ---- items ---- */
    .item {
      background: var(--bg-card); border: 1px solid var(--border-sub); border-left: 3px solid var(--border);
      border-radius: var(--r); box-shadow: var(--shadow-sm); padding: 14px 18px; margin-bottom: 10px;
      display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start;
      transition: box-shadow .16s var(--ease), border-color .16s var(--ease);
    }
    .item:hover { box-shadow: var(--shadow-md); }
    .item.overdue  { border-left-color: var(--red); }
    .item.due-soon { border-left-color: var(--amber); }
    .item-name { font-size: 13px; font-weight: 400; color: var(--text); margin-bottom: 3px; }
    .item-meta { font-size: 10px; color: var(--text-2); letter-spacing: .04em; margin-top: 3px; display: flex; gap: 12px; flex-wrap: wrap; }
    .overdue-label  { color: var(--red); }
    .due-soon-label { color: var(--amber-dim); }
    .item-notes { font-size: 11px; color: var(--text-2); margin-top: 6px; white-space: pre-wrap; line-height: 1.6; }
    .item-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .edit-form { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-sub); display: none; }
    .edit-form.open { display: block; }
    .empty { font-size: 11px; color: var(--text-3); font-style: italic; padding: 24px 4px; }
  </style>
</head>
<body>
<div id="toast"></div>
<header>
  <div class="wordmark">Mind<em>store</em></div>
</header>

<main>
  <div class="section-label">New <span class="accent">maintenance item</span></div>
  <div class="add-form">
    <div class="form-row">
      <input type="text" class="input-name" id="newName" placeholder="Item name (e.g. Change air filter)&#x2026;" autocomplete="off">
      <input type="text" id="newInterval" placeholder="interval (days)" style="width:140px" title="How often, in days">
      <input type="datetime-local" id="newNextDue" title="Next due date">
    </div>
    <div class="form-row">
      <textarea class="notes-input" id="newNotes" placeholder="Notes (optional)&#x2026;"></textarea>
    </div>
    <div class="form-row">
      <button class="btn" id="addBtn">+ Add item</button>
    </div>
  </div>

  <div id="itemList"><div class="empty">loading&#x2026;</div></div>
</main>

<footer id="footerCount">&#x2014;</footer>

<script>
  const listEl  = document.getElementById('itemList');
  const toastEl = document.getElementById('toast');
  let toastTimer = null;

  function toast(msg, type='') {
    clearTimeout(toastTimer); toastEl.textContent = msg;
    toastEl.className = 'show '+type;
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
  }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }
  function dueLabel(iso) {
    if (!iso) return {text:'—',cls:''};
    const diff = Math.ceil((new Date(iso)-Date.now())/86400000);
    if (diff < 0)  return {text:Math.abs(diff)+'d overdue',cls:'overdue-label'};
    if (diff === 0) return {text:'due today',cls:'due-soon-label'};
    if (diff <= 7)  return {text:'due in '+diff+'d',cls:'due-soon-label'};
    return {text:'due in '+diff+'d',cls:''};
  }
  async function api(method, path, body) {
    const opts={method,headers:{'Content-Type':'application/json'}};
    if (body) opts.body=JSON.stringify(body);
    const res=await fetch('/api'+path,opts);
    if (!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.detail||'HTTP '+res.status);}
    return res.status===204?null:res.json();
  }
  async function loadItems() {
    try { render(await api('GET','/home')); }
    catch(e) { listEl.innerHTML='<div class="empty">error: '+esc(e.message)+'</div>'; }
  }
  function render(items) {
    document.getElementById('footerCount').textContent = items.length+' item'+(items.length!==1?'s':'');
    if (!items.length) { listEl.innerHTML='<div class="empty">no home items</div>'; return; }
    listEl.innerHTML='';
    const now=Date.now();
    items.forEach(it => {
      const due=it.next_due_at?new Date(it.next_due_at):null;
      const diffDays=due?Math.ceil((due-now)/86400000):null;
      const overdue=diffDays!==null&&diffDays<0;
      const dueSoon=diffDays!==null&&diffDays>=0&&diffDays<=7;
      const lbl=dueLabel(it.next_due_at);
      const el=document.createElement('div');
      el.className='item'+(overdue?' overdue':dueSoon?' due-soon':'');
      el.dataset.id=it.id;
      const nextDueVal=it.next_due_at?it.next_due_at.slice(0,16):'';
      el.innerHTML=
        '<div>'+
          '<div class="item-name">'+esc(it.name)+'</div>'+
          '<div class="item-meta">'+
            (lbl.text!=='—'?'<span class="'+lbl.cls+'">'+lbl.text+'</span>':'')+
            (it.interval_days?'<span>every '+it.interval_days+'d</span>':'')+
            (it.last_done_at?'<span>last: '+fmtDate(it.last_done_at)+'</span>':'')+
            (it.tags||[]).map(t=>'<span>#'+esc(t)+'</span>').join('')+
          '</div>'+
          (it.notes?'<div class="item-notes">'+esc(it.notes)+'</div>':'')+
          '<div class="edit-form" id="edit-'+it.id+'">'+
            '<div class="form-row">'+
              '<input type="text" class="input-name e-name" value="'+esc(it.name)+'" placeholder="Name">'+
              '<input type="text" class="e-interval" value="'+(it.interval_days||'')+'" placeholder="interval days" style="width:120px">'+
              '<input type="datetime-local" class="e-nextdue" value="'+nextDueVal+'">'+
            '</div>'+
            '<div class="form-row"><textarea class="notes-input e-notes" placeholder="Notes…">'+esc(it.notes||'')+'</textarea></div>'+
            '<div class="form-row">'+
              '<button class="btn btn-sm save-btn" data-id="'+it.id+'">Save</button>'+
              '<button class="btn btn-sm btn-ghost cancel-btn" data-id="'+it.id+'">Cancel</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="item-actions">'+
          '<button class="btn btn-sm btn-done done-btn" data-id="'+it.id+'">✓ done</button>'+
          '<button class="btn btn-sm btn-ghost edit-btn" data-id="'+it.id+'">edit</button>'+
          '<button class="btn btn-sm btn-danger delete-btn" data-id="'+it.id+'">✕</button>'+
        '</div>';
      listEl.appendChild(el);
    });
    listEl.querySelectorAll('.done-btn').forEach(btn=>btn.addEventListener('click',async()=>{
      try { await api('POST','/home/'+btn.dataset.id+'/complete'); toast('marked done!'); loadItems(); }
      catch(e){toast(e.message,'error');}
    }));
    listEl.querySelectorAll('.delete-btn').forEach(btn=>btn.addEventListener('click',async()=>{
      if(!confirm('Delete this item?'))return;
      try{await api('DELETE','/home/'+btn.dataset.id);toast('deleted');loadItems();}
      catch(e){toast(e.message,'error');}
    }));
    listEl.querySelectorAll('.edit-btn').forEach(btn=>btn.addEventListener('click',()=>{document.getElementById('edit-'+btn.dataset.id).classList.toggle('open');}));
    listEl.querySelectorAll('.cancel-btn').forEach(btn=>btn.addEventListener('click',()=>{document.getElementById('edit-'+btn.dataset.id).classList.remove('open');}));
    listEl.querySelectorAll('.save-btn').forEach(btn=>btn.addEventListener('click',async()=>{
      const form=document.getElementById('edit-'+btn.dataset.id);
      const body={name:form.querySelector('.e-name').value.trim(),interval_days:parseInt(form.querySelector('.e-interval').value)||null,next_due_at:form.querySelector('.e-nextdue').value||null,notes:form.querySelector('.e-notes').value.trim()||null};
      try{await api('PUT','/home/'+btn.dataset.id,body);toast('saved');loadItems();}
      catch(e){toast(e.message,'error');}
    }));
  }
  document.getElementById('addBtn').addEventListener('click',async()=>{
    const name=document.getElementById('newName').value.trim();if(!name)return;
    const body={name,interval_days:parseInt(document.getElementById('newInterval').value)||null,next_due_at:document.getElementById('newNextDue').value||null,notes:document.getElementById('newNotes').value.trim()||null};
    try{await api('POST','/home',body);toast('item added');['newName','newInterval','newNotes'].forEach(id=>{document.getElementById(id).value='';});document.getElementById('newNextDue').value='';loadItems();}
    catch(e){toast(e.message,'error');}
  });
  document.getElementById('newName').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click();});
  loadItems();
</script>
<script src="/nav.js"></script>
</body>
</html>
