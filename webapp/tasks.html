<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks &#x2014; Mindstore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ---- add form ---- */
    .add-form {
      position: relative; overflow: hidden;
      background: var(--bg-card); border: 1px solid var(--border-sub);
      border-radius: var(--r-lg); box-shadow: var(--shadow-md);
      padding: 22px 24px; margin-bottom: 28px;
    }
    .add-form::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--blue) 62%, var(--amber));
    }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .form-row:last-child { margin-bottom: 0; }
    input[type=text], input[type=date], select, textarea.notes-input {
      background: var(--bg-2); border: 1px solid var(--border); color: var(--text);
      font-family: var(--mono); font-size: 12px; padding: 9px 12px; outline: none;
      border-radius: var(--r-sm);
      transition: border-color .18s var(--ease), box-shadow .18s var(--ease), background .18s var(--ease);
    }
    input[type=text]:focus, input[type=date]:focus, select:focus, textarea.notes-input:focus {
      border-color: var(--teal); background: var(--bg-card); box-shadow: 0 0 0 3px var(--teal-glow);
    }
    input::placeholder, textarea::placeholder { color: var(--text-3); }
    .input-title { flex: 1; min-width: 200px; }
    select { cursor: pointer; }
    textarea.notes-input { width: 100%; min-height: 62px; resize: vertical; line-height: 1.6; }

    /* ---- buttons ---- */
    .btn {
      background: linear-gradient(135deg, var(--teal), var(--teal-dim)); color: #fff;
      border: 1px solid transparent; font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: .12em; text-transform: uppercase; padding: 9px 22px; cursor: pointer;
      border-radius: var(--r); box-shadow: 0 3px 12px var(--teal-glow);
      transition: box-shadow .16s var(--ease), background .16s var(--ease), color .16s var(--ease), border-color .16s var(--ease), transform .08s var(--ease);
    }
    .btn:hover { box-shadow: 0 5px 18px var(--teal-glow), 0 0 0 1px var(--teal); }
    .btn:active { transform: scale(.97); }
    .btn-sm { padding: 5px 12px; font-size: 9px; box-shadow: none; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-2); box-shadow: none; }
    .btn-ghost:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); box-shadow: none; }
    .btn-success { background: transparent; border: 1px solid rgba(24,165,93,0.4); color: var(--green-dim); box-shadow: none; }
    .btn-success:hover { background: var(--green-bg); border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
    .btn-danger { background: transparent; border: 1px solid var(--border); color: var(--text-3); box-shadow: none; }
    .btn-danger:hover { background: rgba(204,58,58,0.1); border-color: var(--red); color: var(--red); box-shadow: none; }

    /* ---- filters ---- */
    .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
    .filter-btn {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text-3);
      font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
      padding: 5px 14px; cursor: pointer; border-radius: var(--r-pill);
      transition: all .14s var(--ease);
    }
    .filter-btn:hover { border-color: var(--teal); color: var(--teal); }
    .filter-btn.active { background: var(--teal-bg); border-color: rgba(10,168,152,0.4); color: var(--teal-dim); }

    /* ---- task items ---- */
    .task-item {
      background: var(--bg-card); border: 1px solid var(--border-sub); border-left: 3px solid var(--border);
      border-radius: var(--r); box-shadow: var(--shadow-sm); padding: 14px 18px; margin-bottom: 10px;
      display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start;
      transition: box-shadow .16s var(--ease), border-color .16s var(--ease);
    }
    .task-item:hover { box-shadow: var(--shadow-md); }
    .task-item.overdue  { border-left-color: var(--red); }
    .task-item.done     { opacity: .5; }
    .task-item.priority-high   { border-left-color: var(--red); }
    .task-item.priority-medium { border-left-color: var(--amber); }
    .task-item.priority-low    { border-left-color: var(--text-3); }
    .task-item.overdue.priority-high, .task-item.overdue.priority-medium, .task-item.overdue.priority-low { border-left-color: var(--red); }

    .task-title { font-size: 13px; font-weight: 400; margin-bottom: 4px; color: var(--text); }
    .task-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 10px; color: var(--text-2); letter-spacing: .04em; margin-top: 3px; align-items: center; }
    .badge { display: inline-flex; align-items: center; padding: 2px 9px; font-size: 9px; letter-spacing: .08em; text-transform: uppercase; border-radius: var(--r-pill); }
    .badge-high   { background: rgba(204,58,58,0.1);   color: var(--red);       border: 1px solid rgba(204,58,58,0.25); }
    .badge-medium { background: var(--amber-bg);       color: var(--amber-dim); border: 1px solid rgba(232,131,58,0.28); }
    .badge-low    { background: var(--bg-raised);      color: var(--text-3);    border: 1px solid var(--border); }
    .badge-recur  { background: var(--green-bg);       color: var(--green-dim); border: 1px solid rgba(24,165,93,0.28); }
    .overdue-label { color: var(--red); font-weight: 500; }
    .task-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .task-notes { font-size: 11px; color: var(--text-2); margin-top: 6px; white-space: pre-wrap; line-height: 1.6; overflow-wrap: break-word; word-break: break-word; }

    .edit-form { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-sub); display: none; }
    .edit-form.open { display: block; }
    .empty { font-size: 11px; color: var(--text-3); font-style: italic; padding: 24px 4px; }
  </style>
</head>
<body>
<div id="toast"></div>
<header>
  <div class="wordmark">Mind<em>store</em></div>
</header>

<main>
  <div class="section-label">New <span class="accent">task</span></div>
  <div class="add-form">
    <div class="form-row">
      <input type="text" class="input-title" id="newTitle" placeholder="Task title&#x2026;" autocomplete="off">
      <select id="newPriority">
        <option value="medium">medium</option>
        <option value="high">high</option>
        <option value="low">low</option>
      </select>
      <select id="newCategory">
        <option value="general">general</option>
        <option value="work">work</option>
        <option value="personal">personal</option>
        <option value="health">health</option>
        <option value="finance">finance</option>
        <option value="home">home</option>
      </select>
      <input type="date" id="newDue" title="Due date">
      <input type="text" id="newRecur" placeholder="recur (days)" style="width:120px" title="Recurrence in days">
    </div>
    <div class="form-row">
      <textarea class="notes-input" id="newNotes" placeholder="Notes (optional)&#x2026;"></textarea>
    </div>
    <div class="form-row">
      <button class="btn" id="addBtn">+ Add task</button>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-status="">all open</button>
    <button class="filter-btn" data-status="done">done</button>
    <button class="filter-btn" data-status="cancelled">cancelled</button>
    <button class="filter-btn" data-due="7">due this week</button>
    <button class="filter-btn" data-cat="work">work</button>
    <button class="filter-btn" data-cat="personal">personal</button>
    <button class="filter-btn" data-cat="health">health</button>
    <button class="filter-btn" data-cat="home">home</button>
  </div>

  <div id="taskList"><div class="empty">loading&#x2026;</div></div>
</main>

<footer id="footerCount">&#x2014;</footer>

<script>
  const taskListEl = document.getElementById('taskList');
  const toastEl    = document.getElementById('toast');
  let toastTimer = null, filterStatus = '', filterCat = null, filterDue = null;

  function toast(msg, type='') {
    clearTimeout(toastTimer); toastEl.textContent = msg;
    toastEl.className = 'show '+type;
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
  }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function relDate(iso) {
    if (!iso) return '';
    const d = new Date(iso), today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((d - today)/86400000);
    if (diff < 0)  return Math.abs(diff)+'d overdue';
    if (diff === 0) return 'today';
    if (diff === 1) return 'tomorrow';
    return 'in '+diff+'d';
  }
  async function api(method, path, body) {
    const opts = { method, headers:{'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api'+path, opts);
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail||'HTTP '+res.status); }
    return res.status === 204 ? null : res.json();
  }
  async function loadTasks() {
    try {
      let qs = filterStatus ? '?status='+filterStatus : '?status=open';
      if (filterCat) qs += '&category='+filterCat;
      if (filterDue) qs += '&due_soon_days='+filterDue;
      render(await api('GET', '/tasks'+qs));
    } catch(e) { taskListEl.innerHTML = '<div class="empty">error: '+esc(e.message)+'</div>'; }
  }
  function render(tasks) {
    document.getElementById('footerCount').textContent = tasks.length+' task'+(tasks.length!==1?'s':'');
    if (!tasks.length) { taskListEl.innerHTML = '<div class="empty">no tasks</div>'; return; }
    taskListEl.innerHTML = '';
    const today = new Date(); today.setHours(0,0,0,0);
    tasks.forEach(t => {
      const overdue = t.due_date && new Date(t.due_date) < today && t.status === 'open';
      const el = document.createElement('div');
      el.className = 'task-item priority-'+t.priority+(overdue?' overdue':'')+(t.status==='done'?' done':'');
      el.dataset.id = t.id;
      const dueDate = t.due_date ? new Date(t.due_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
      const dueTxt = t.due_date ? '<span class="'+(overdue?'overdue-label':'')+'">due '+esc(dueDate)+' ('+relDate(t.due_date+'T00:00:00')+')</span>' : '';
      const recurBadge = t.recurrence_days ? '<span class="badge badge-recur">&#x21BB; '+t.recurrence_days+'d</span>' : '';
      el.innerHTML =
        '<div>'+
          '<div class="task-title">'+esc(t.title)+'</div>'+
          '<div class="task-meta">'+
            '<span class="badge badge-'+t.priority+'">'+t.priority+'</span>'+
            '<span>'+esc(t.category)+'</span>'+
            dueTxt+recurBadge+
            (t.tags||[]).map(tg=>'<span>#'+esc(tg)+'</span>').join('')+
          '</div>'+
          (t.notes?'<div class="task-notes">'+esc(t.notes)+'</div>':'')+
          '<div class="edit-form" id="edit-'+t.id+'">'+
            '<div class="form-row">'+
              '<input type="text" class="input-title e-title" value="'+esc(t.title)+'" placeholder="Title">'+
              '<select class="e-priority"><option value="high">high</option><option value="medium">medium</option><option value="low">low</option></select>'+
              '<select class="e-category"><option value="general">general</option><option value="work">work</option><option value="personal">personal</option><option value="health">health</option><option value="finance">finance</option><option value="home">home</option></select>'+
              '<input type="date" class="e-due" value="'+(t.due_date||'')+'">'+
              '<input type="text" class="e-recur" value="'+(t.recurrence_days||'')+'" placeholder="recur days" style="width:100px">'+
            '</div>'+
            '<div class="form-row"><textarea class="notes-input e-notes" placeholder="Notes&#x2026;">'+esc(t.notes||'')+'</textarea></div>'+
            '<div class="form-row">'+
              '<button class="btn btn-sm save-btn" data-id="'+t.id+'">Save</button>'+
              '<button class="btn btn-sm btn-ghost cancel-btn" data-id="'+t.id+'">Cancel</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="task-actions">'+
          (t.status==='open'?'<button class="btn btn-sm btn-success complete-btn" data-id="'+t.id+'">✓ done</button>':'')+
          '<button class="btn btn-sm btn-ghost edit-btn" data-id="'+t.id+'">edit</button>'+
          '<button class="btn btn-sm btn-danger delete-btn" data-id="'+t.id+'">✕</button>'+
        '</div>';
      el.querySelector('.e-priority').value = t.priority;
      el.querySelector('.e-category').value = t.category;
      taskListEl.appendChild(el);
    });
    taskListEl.querySelectorAll('.complete-btn').forEach(btn => btn.addEventListener('click', async () => {
      try { await api('POST','/tasks/'+btn.dataset.id+'/complete'); toast('done!'); loadTasks(); }
      catch(e) { toast(e.message,'error'); }
    }));
    taskListEl.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', async () => {
      if (!confirm('Delete this task?')) return;
      try { await api('DELETE','/tasks/'+btn.dataset.id); toast('deleted'); loadTasks(); }
      catch(e) { toast(e.message,'error'); }
    }));
    taskListEl.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => {
      document.getElementById('edit-'+btn.dataset.id).classList.toggle('open');
    }));
    taskListEl.querySelectorAll('.cancel-btn').forEach(btn => btn.addEventListener('click', () => {
      document.getElementById('edit-'+btn.dataset.id).classList.remove('open');
    }));
    taskListEl.querySelectorAll('.save-btn').forEach(btn => btn.addEventListener('click', async () => {
      const form = document.getElementById('edit-'+btn.dataset.id);
      const body = {
        title:           form.querySelector('.e-title').value.trim(),
        priority:        form.querySelector('.e-priority').value,
        category:        form.querySelector('.e-category').value,
        notes:           form.querySelector('.e-notes').value.trim()||null,
        due_date:        form.querySelector('.e-due').value||null,
        recurrence_days: parseInt(form.querySelector('.e-recur').value)||null,
      };
      try { await api('PUT','/tasks/'+btn.dataset.id,body); toast('saved'); loadTasks(); }
      catch(e) { toast(e.message,'error'); }
    }));
  }
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn'); if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterStatus = btn.dataset.status ?? '';
    filterCat    = btn.dataset.cat ?? null;
    filterDue    = btn.dataset.due ? parseInt(btn.dataset.due) : null;
    if (btn.dataset.due || btn.dataset.cat) filterStatus = '';
    loadTasks();
  });
  document.getElementById('addBtn').addEventListener('click', async () => {
    const title = document.getElementById('newTitle').value.trim(); if (!title) return;
    const body = {
      title,
      priority: document.getElementById('newPriority').value,
      category: document.getElementById('newCategory').value,
      notes:    document.getElementById('newNotes').value.trim()||null,
      due_date: document.getElementById('newDue').value||null,
      recurrence_days: parseInt(document.getElementById('newRecur').value)||null,
    };
    try {
      await api('POST','/tasks',body); toast('task added');
      ['newTitle','newNotes','newDue','newRecur'].forEach(id => { document.getElementById(id).value=''; });
      loadTasks();
    } catch(e) { toast(e.message,'error'); }
  });
  document.getElementById('newTitle').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('addBtn').click(); });
  loadTasks();
</script>
<script src="/nav.js"></script>
</body>
</html>
