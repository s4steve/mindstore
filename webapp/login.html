<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindstore — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { align-items: center; justify-content: center; }

    .login-card {
      position: relative; overflow: hidden;
      background: var(--bg-card); border: 1px solid var(--border-sub);
      border-radius: var(--r-lg); box-shadow: var(--shadow-lg);
      padding: 40px; width: 100%; max-width: 380px;
      animation: riseIn 0.5s var(--ease) both;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--blue) 62%, var(--amber));
    }
    .login-card h1 {
      font-family: var(--display); font-size: 30px; font-weight: 500;
      letter-spacing: -0.01em; margin-bottom: 4px; text-align: center; color: var(--text);
    }
    .login-card h1 em { font-style: italic; font-weight: 400; color: var(--teal); }
    .login-sub {
      text-align: center; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 28px;
    }
    .form-row { margin-bottom: 16px; }
    .form-row label {
      display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-2); margin-bottom: 7px;
    }
    .login-btn { width: 100%; margin-top: 8px; }
    .error {
      margin-top: 16px; padding: 9px 12px; font-size: 12px; color: var(--red);
      background: rgba(204,58,58,0.08); border: 1px solid rgba(204,58,58,0.2);
      border-radius: var(--r-sm); text-align: center; display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Mind<em>store</em></h1>
    <div class="login-sub">sign in to continue</div>
    <form id="login-form">
      <div class="form-row">
        <label for="username">Username</label>
        <input type="text" class="field" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input type="password" class="field" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary login-btn">Sign in</button>
      <div class="error" id="error-msg"></div>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.detail || 'Invalid credentials';
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Connection error';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
