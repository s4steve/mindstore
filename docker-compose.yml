services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mindstore}
      POSTGRES_USER: ${POSTGRES_USER:-mindstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindstore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${INGESTION_PORT:-8000}:${INGESTION_PORT:-8000}"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      API_KEY: ${API_KEY}
      INGESTION_HOST: ${INGESTION_HOST:-0.0.0.0}
      INGESTION_PORT: ${INGESTION_PORT:-8000}
      EMBEDDER_BACKEND: ${EMBEDDER_BACKEND:-local}
      EMBEDDER_MODEL: ${EMBEDDER_MODEL:-all-MiniLM-L6-v2}
      WEB_USERNAME: ${WEB_USERNAME}
      WEB_PASSWORD: ${WEB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  mcp_server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8001}:${MCP_PORT:-8001}"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      INGESTION_URL: http://ingestion:${INGESTION_PORT:-8000}
      API_KEY: ${API_KEY}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8001}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      ingestion:
        condition: service_started

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEBAPP_PORT:-3000}:${WEBAPP_PORT:-3000}"
    environment:
      API_KEY: ${API_KEY}
      WEB_USERNAME: ${WEB_USERNAME}
      WEB_PASSWORD: ${WEB_PASSWORD}
      WEBAPP_PORT: ${WEBAPP_PORT:-3000}
      INGESTION_PORT: ${INGESTION_PORT:-8000}
    volumes:
      - ${TLS_CERT_PATH}:/etc/nginx/certs/server.crt:ro
      - ${TLS_KEY_PATH}:/etc/nginx/certs/server.key:ro
    depends_on:
      ingestion:
        condition: service_started

volumes:
  postgres_data:
