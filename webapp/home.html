<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home &#x2014; Mindstore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#f0f5f8; --bg-card:#ffffff; --bg-raised:#e6edf3; --bg-hover:#dde7ef;
      --border:#c4d4e0; --border-sub:#d8e5ee;
      --text:#0f2130; --text-2:#3d6a82; --text-3:#8aafc4;
      --teal:#0aa898; --teal-dim:#088a7c; --teal-glow:rgba(10,168,152,0.15); --teal-bg:rgba(10,168,152,0.08);
      --green:#1aaa60; --green-dim:#158a4e; --green-glow:rgba(26,170,96,0.14); --green-bg:rgba(26,170,96,0.08);
      --blue:#2a7db8; --red:#cc3a3a; --yellow:#a06818;
      --display:'Playfair Display',serif; --mono:'IBM Plex Mono',monospace;
    }
    html,body { height:100%; background-color:var(--bg); background-image:radial-gradient(ellipse at 50% 0%,rgba(10,168,152,0.05) 0%,transparent 55%),radial-gradient(ellipse at 90% 90%,rgba(42,125,184,0.04) 0%,transparent 45%); background-attachment:fixed; color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.65; -webkit-font-smoothing:antialiased; }
    body { display:flex; flex-direction:column; min-height:100vh; }

    #toast { position:fixed; bottom:24px; right:24px; background:var(--bg-card); border:1px solid var(--border); border-left:2px solid var(--green); padding:10px 18px; font-size:11px; color:var(--green); letter-spacing:.04em; opacity:0; transform:translateY(8px); transition:opacity .2s,transform .2s; pointer-events:none; z-index:9999; }
    #toast.error { border-left-color:var(--red); color:var(--red); }
    #toast.show  { opacity:1; transform:translateY(0); }

    header { display:flex; align-items:center; justify-content:space-between; padding:20px 40px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .wordmark { font-family:var(--display); font-size:26px; font-weight:400; color:var(--text); letter-spacing:.02em; }
    .wordmark em { font-style:italic; color:var(--teal); }

    main { flex:1; max-width:860px; width:100%; margin:0 auto; padding:40px 40px 48px; }
    .section-label { display:flex; align-items:center; gap:14px; font-family:var(--display); font-size:14px; font-style:italic; color:var(--text-2); margin-bottom:18px; }
    .section-label::before { content:''; display:block; width:30px; height:1px; background:var(--teal); flex-shrink:0; }

    .add-form { background:var(--bg-card); border:1px solid var(--border); border-top:2px solid var(--teal); padding:20px 24px; margin-bottom:28px; }
    .form-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
    .form-row:last-child { margin-bottom:0; }
    input[type=text],input[type=datetime-local],textarea.notes-input {
      background:var(--bg-raised); border:1px solid var(--border); color:var(--text);
      font-family:var(--mono); font-size:12px; padding:8px 12px; outline:none;
      transition:border-color .15s,box-shadow .15s,background .15s;
    }
    input[type=text]:focus,input[type=datetime-local]:focus,textarea.notes-input:focus { border-color:var(--teal); background:var(--bg-hover); box-shadow:0 0 0 3px var(--teal-glow); }
    input::placeholder,textarea::placeholder { color:var(--text-3); }
    .input-name { flex:1; min-width:200px; }
    textarea.notes-input { width:100%; min-height:60px; resize:vertical; }

    .btn { background:var(--teal); color:var(--bg); border:none; font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:.12em; text-transform:uppercase; padding:9px 22px; cursor:pointer; transition:background .15s,box-shadow .15s; }
    .btn:hover { background:var(--teal-dim); box-shadow:0 0 20px var(--teal-glow); }
    .btn-sm { padding:5px 12px; font-size:9px; }
    .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-2); }
    .btn-ghost:hover { border-color:var(--teal); color:var(--teal); background:var(--teal-bg); }
    .btn-done { background:transparent; border:1px solid rgba(46,200,122,0.35); color:var(--green); }
    .btn-done:hover { background:var(--green-bg); border-color:var(--green); box-shadow:0 0 16px var(--green-glow); }
    .btn-danger { background:transparent; border:1px solid var(--border); color:var(--text-3); }
    .btn-danger:hover { background:rgba(224,96,96,0.1); border-color:var(--red); color:var(--red); }

    /* Items */
    .item { background:var(--bg-card); border:1px solid var(--border); border-left:3px solid var(--border); padding:14px 18px; margin-bottom:8px; display:grid; grid-template-columns:1fr auto; gap:12px; align-items:start; transition:border-color .15s,background .15s; }
    .item:hover { background:var(--bg-raised); }
    .item.overdue  { border-left-color:var(--red); }
    .item.due-soon { border-left-color:var(--yellow); }
    .item-name { font-size:13px; font-weight:400; color:var(--text); margin-bottom:3px; }
    .item-meta { font-size:10px; color:var(--text-2); letter-spacing:.04em; margin-top:3px; display:flex; gap:12px; flex-wrap:wrap; }
    .overdue-label  { color:var(--red); }
    .due-soon-label { color:var(--yellow); }
    .item-notes { font-size:11px; color:var(--text-2); margin-top:6px; white-space:pre-wrap; line-height:1.6; }
    .item-actions { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
    .edit-form { margin-top:14px; padding-top:14px; border-top:1px solid var(--border-sub); display:none; }
    .edit-form.open { display:block; }

    .empty { font-size:11px; color:var(--text-3); font-style:italic; padding:20px 0; }
    footer { padding:12px 40px; border-top:1px solid var(--border); font-size:10px; color:var(--text-3); letter-spacing:.07em; flex-shrink:0; }
    ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); }
  </style>
</head>
<body>
<div id="toast"></div>
<header>
  <div class="wordmark">Mind<em>store</em></div>
</header>

<main>
  <div class="section-label">New maintenance item</div>
  <div class="add-form">
    <div class="form-row">
      <input type="text" class="input-name" id="newName" placeholder="Item name (e.g. Change air filter)&#x2026;" autocomplete="off">
      <input type="text" id="newInterval" placeholder="interval (days)" style="width:140px" title="How often, in days">
      <input type="datetime-local" id="newNextDue" title="Next due date">
    </div>
    <div class="form-row">
      <textarea class="notes-input" id="newNotes" placeholder="Notes (optional)&#x2026;"></textarea>
    </div>
    <div class="form-row">
      <button class="btn" id="addBtn">+ Add item</button>
    </div>
  </div>

  <div id="itemList"><div class="empty">loading&#x2026;</div></div>
</main>

<footer id="footerCount">&#x2014;</footer>

<script>
  const listEl  = document.getElementById('itemList');
  const toastEl = document.getElementById('toast');
  let toastTimer = null;

  function toast(msg, type='') {
    clearTimeout(toastTimer); toastEl.textContent = msg;
    toastEl.className = 'show '+type;
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
  }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(iso) {
    if (!iso) return '\u2014';
    return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }
  function dueLabel(iso) {
    if (!iso) return {text:'\u2014',cls:''};
    const diff = Math.ceil((new Date(iso)-Date.now())/86400000);
    if (diff < 0)  return {text:Math.abs(diff)+'d overdue',cls:'overdue-label'};
    if (diff === 0) return {text:'due today',cls:'due-soon-label'};
    if (diff <= 7)  return {text:'due in '+diff+'d',cls:'due-soon-label'};
    return {text:'due in '+diff+'d',cls:''};
  }
  async function api(method, path, body) {
    const opts={method,headers:{'Content-Type':'application/json'}};
    if (body) opts.body=JSON.stringify(body);
    const res=await fetch('/api'+path,opts);
    if (!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.detail||'HTTP '+res.status);}
    return res.status===204?null:res.json();
  }
  async function loadItems() {
    try { render(await api('GET','/home')); }
    catch(e) { listEl.innerHTML='<div class="empty">error: '+esc(e.message)+'</div>'; }
  }
  function render(items) {
    document.getElementById('footerCount').textContent = items.length+' item'+(items.length!==1?'s':'');
    if (!items.length) { listEl.innerHTML='<div class="empty">no home items</div>'; return; }
    listEl.innerHTML='';
    const now=Date.now();
    items.forEach(it => {
      const due=it.next_due_at?new Date(it.next_due_at):null;
      const diffDays=due?Math.ceil((due-now)/86400000):null;
      const overdue=diffDays!==null&&diffDays<0;
      const dueSoon=diffDays!==null&&diffDays>=0&&diffDays<=7;
      const lbl=dueLabel(it.next_due_at);
      const el=document.createElement('div');
      el.className='item'+(overdue?' overdue':dueSoon?' due-soon':'');
      el.dataset.id=it.id;
      const nextDueVal=it.next_due_at?it.next_due_at.slice(0,16):'';
      el.innerHTML=
        '<div>'+
          '<div class="item-name">'+esc(it.name)+'</div>'+
          '<div class="item-meta">'+
            (lbl.text!=='\u2014'?'<span class="'+lbl.cls+'">'+lbl.text+'</span>':'')+
            (it.interval_days?'<span>every '+it.interval_days+'d</span>':'')+
            (it.last_done_at?'<span>last: '+fmtDate(it.last_done_at)+'</span>':'')+
            (it.tags||[]).map(t=>'<span>#'+esc(t)+'</span>').join('')+
          '</div>'+
          (it.notes?'<div class="item-notes">'+esc(it.notes)+'</div>':'')+
          '<div class="edit-form" id="edit-'+it.id+'">'+
            '<div class="form-row">'+
              '<input type="text" class="input-name e-name" value="'+esc(it.name)+'" placeholder="Name">'+
              '<input type="text" class="e-interval" value="'+(it.interval_days||'')+'" placeholder="interval days" style="width:120px">'+
              '<input type="datetime-local" class="e-nextdue" value="'+nextDueVal+'">'+
            '</div>'+
            '<div class="form-row"><textarea class="notes-input e-notes" placeholder="Notes\u2026">'+esc(it.notes||'')+'</textarea></div>'+
            '<div class="form-row">'+
              '<button class="btn btn-sm save-btn" data-id="'+it.id+'">Save</button>'+
              '<button class="btn btn-sm btn-ghost cancel-btn" data-id="'+it.id+'">Cancel</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="item-actions">'+
          '<button class="btn btn-sm btn-done done-btn" data-id="'+it.id+'">\u2713 done</button>'+
          '<button class="btn btn-sm btn-ghost edit-btn" data-id="'+it.id+'">edit</button>'+
          '<button class="btn btn-sm btn-danger delete-btn" data-id="'+it.id+'">\u2715</button>'+
        '</div>';
      listEl.appendChild(el);
    });
    listEl.querySelectorAll('.done-btn').forEach(btn=>btn.addEventListener('click',async()=>{
      try { await api('POST','/home/'+btn.dataset.id+'/complete'); toast('marked done!'); loadItems(); }
      catch(e){toast(e.message,'error');}
    }));
    listEl.querySelectorAll('.delete-btn').forEach(btn=>btn.addEventListener('click',async()=>{
      if(!confirm('Delete this item?'))return;
      try{await api('DELETE','/home/'+btn.dataset.id);toast('deleted');loadItems();}
      catch(e){toast(e.message,'error');}
    }));
    listEl.querySelectorAll('.edit-btn').forEach(btn=>btn.addEventListener('click',()=>{document.getElementById('edit-'+btn.dataset.id).classList.toggle('open');}));
    listEl.querySelectorAll('.cancel-btn').forEach(btn=>btn.addEventListener('click',()=>{document.getElementById('edit-'+btn.dataset.id).classList.remove('open');}));
    listEl.querySelectorAll('.save-btn').forEach(btn=>btn.addEventListener('click',async()=>{
      const form=document.getElementById('edit-'+btn.dataset.id);
      const body={name:form.querySelector('.e-name').value.trim(),interval_days:parseInt(form.querySelector('.e-interval').value)||null,next_due_at:form.querySelector('.e-nextdue').value||null,notes:form.querySelector('.e-notes').value.trim()||null};
      try{await api('PUT','/home/'+btn.dataset.id,body);toast('saved');loadItems();}
      catch(e){toast(e.message,'error');}
    }));
  }
  document.getElementById('addBtn').addEventListener('click',async()=>{
    const name=document.getElementById('newName').value.trim();if(!name)return;
    const body={name,interval_days:parseInt(document.getElementById('newInterval').value)||null,next_due_at:document.getElementById('newNextDue').value||null,notes:document.getElementById('newNotes').value.trim()||null};
    try{await api('POST','/home',body);toast('item added');['newName','newInterval','newNotes'].forEach(id=>{document.getElementById(id).value='';});document.getElementById('newNextDue').value='';loadItems();}
    catch(e){toast(e.message,'error');}
  });
  document.getElementById('newName').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click();});
  loadItems();
</script>
<script src="/nav.js"></script>
</body>
</html>
