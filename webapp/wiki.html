<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindstore &mdash; Wiki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ---- layout ---- */
    .wiki-layout { display: flex; flex: 1; max-width: 1140px; width: 100%; margin: 0 auto; min-height: 0; }

    /* ---- sidebar ---- */
    .sidebar { width: 250px; flex-shrink: 0; padding: 30px 20px 30px 40px; border-right: 1px solid var(--border-sub); overflow-y: auto; }
    .sidebar-title {
      font-family: var(--display); font-size: 18px; font-style: italic; color: var(--text);
      margin-bottom: 16px; display: flex; align-items: center; gap: 12px; letter-spacing: -0.01em;
    }
    .sidebar-title::before { content: ''; display: block; width: 24px; height: 2px; flex-shrink: 0; border-radius: 2px; background: linear-gradient(90deg, var(--teal), var(--blue)); }
    #tagFilter {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
      font-family: var(--mono); font-size: 11px; padding: 9px 12px; outline: none; caret-color: var(--teal);
      margin-bottom: 14px; border-radius: var(--r-sm); transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
    }
    #tagFilter::placeholder { color: var(--text-3); font-style: italic; }
    #tagFilter:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-glow); }
    .tag-list { list-style: none; }
    .tag-item {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 6px 10px; cursor: pointer; border-radius: var(--r-sm);
      transition: background .12s var(--ease), color .12s var(--ease);
      font-size: 12px; color: var(--text-2);
    }
    .tag-item:hover { background: var(--bg-hover); }
    .tag-item.active { background: var(--teal-bg); color: var(--teal-dim); }
    .tag-name::before { content: '#'; color: var(--teal); margin-right: 2px; opacity: 0.55; }
    .tag-item.active .tag-name::before { opacity: 1; }
    .tag-count { font-size: 10px; color: var(--text-3); min-width: 20px; text-align: right; }
    .tag-item.active .tag-count { color: var(--teal-dim); }

    /* ---- main content ---- */
    .wiki-main { flex: 1; padding: 30px 40px 48px 34px; overflow-y: auto; min-width: 0; }
    .wiki-empty { font-family: var(--display); font-size: 18px; font-style: italic; color: var(--text-3); padding-top: 48px; text-align: center; }
    .wiki-empty-sub { font-family: var(--mono); font-size: 11px; color: var(--text-3); margin-top: 8px; }

    /* ---- tag page header ---- */
    .tag-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; }
    .tag-header h1 { font-family: var(--display); font-size: 32px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
    .tag-header h1::before { content: '#'; color: var(--teal); margin-right: 2px; }
    .tag-header .item-count { font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; }

    /* ---- related tags ---- */
    .related-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 30px; min-height: 24px; }
    .related-label { font-size: 10px; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; margin-right: 4px; }
    .related-chip {
      display: inline-flex; align-items: center; gap: 5px; background: var(--blue-bg);
      border: 1px solid rgba(42,125,184,0.25); color: var(--blue-dim); font-size: 10px;
      padding: 3px 11px; border-radius: var(--r-pill); cursor: pointer; transition: all .14s var(--ease);
    }
    .related-chip:hover { border-color: var(--blue); background: rgba(42,125,184,0.14); }
    .related-chip .co-count { color: var(--text-3); font-size: 9px; }

    /* ---- section dividers ---- */
    .section-divider { display: flex; align-items: center; gap: 14px; margin: 34px 0 16px; }
    .section-divider:first-of-type { margin-top: 0; }
    .section-divider::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
    .section-divider span { font-family: var(--display); font-size: 16px; font-style: italic; color: var(--text-2); white-space: nowrap; }
    .section-divider .type-count { font-family: var(--mono); font-size: 10px; color: var(--text-3); font-style: normal; margin-left: 4px; }
    .section-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border) 0%, transparent 100%); }

    /* ---- item cards ---- */
    .wiki-item { padding: 13px 14px; border-radius: var(--r); cursor: pointer; transition: background .12s var(--ease), box-shadow .12s var(--ease); animation: slideIn 0.3s var(--ease) both; }
    .wiki-item:not(:last-child) { box-shadow: 0 1px 0 var(--border-sub); }
    .wiki-item:hover { background: var(--bg-card); box-shadow: var(--shadow-sm); }
    .item-meta { display: flex; gap: 10px; align-items: baseline; margin-bottom: 4px; }
    .item-type { font-size: 9px; color: var(--text-3); letter-spacing: 0.12em; text-transform: uppercase; }
    .item-time { font-size: 10px; color: var(--text-3); letter-spacing: 0.04em; }
    .item-sim { font-size: 10px; font-weight: 500; color: var(--amber-dim); letter-spacing: 0.02em; margin-left: auto; }
    .item-content { font-size: 12px; font-weight: 300; color: var(--text-2); line-height: 1.7; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .item-tags { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .item-tag { font-size: 9px; color: var(--text-3); letter-spacing: 0.04em; }
    .item-tag::before { content: '#'; color: var(--blue); margin-right: 1px; }

    /* ---- suggested connections ---- */
    .suggested-section { margin-top: 42px; }
    .suggested-note { font-size: 10px; color: var(--text-3); font-style: italic; margin-bottom: 12px; letter-spacing: 0.02em; }

    @media (max-width: 720px) {
      .wiki-layout { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-sub); padding: 16px 20px; max-height: 200px; }
      .wiki-main { padding: 20px; }
    }
  </style>
</head>
<body>

<div id="modal-overlay">
  <div id="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <div class="modal-meta">
        <span class="modal-type" id="modal-type"></span>
        <span id="modal-time"></span>
        <span id="modal-sim"></span>
      </div>
      <button id="modal-close" aria-label="close">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div id="modal-content"></div>
      <div class="modal-tags" id="modal-tags"></div>
    </div>
  </div>
</div>

<header>
  <div class="wordmark">Mind<em>store</em></div>
  <div class="header-right">
    <span>
      <span class="status-dot" id="dot"></span>
      <span id="connStatus">connecting</span>
    </span>
  </div>
</header>

<div class="wiki-layout">
  <aside class="sidebar">
    <div class="sidebar-title">Tags</div>
    <input id="tagFilter" type="text" placeholder="filter tags&#x2026;" autocomplete="off" spellcheck="false">
    <ul class="tag-list" id="tagList"></ul>
  </aside>

  <section class="wiki-main" id="wikiMain">
    <div class="wiki-empty">
      Select a tag to explore
      <div class="wiki-empty-sub">or add tags to your thoughts, notes, and tasks</div>
    </div>
  </section>
</div>

<footer>
  <span>mindstore wiki</span>
  <span id="footerInfo">&mdash;</span>
</footer>

<script>
  const tagListEl   = document.getElementById('tagList');
  const tagFilterEl = document.getElementById('tagFilter');
  const wikiMainEl  = document.getElementById('wikiMain');
  const footerInfo  = document.getElementById('footerInfo');
  const dotEl       = document.getElementById('dot');
  const connEl      = document.getElementById('connStatus');

  let allTags = [];
  let activeTag = null;

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function relTime(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h';
    const d = Math.floor(h / 24);
    if (d < 30) return d + 'd';
    return Math.floor(d / 30) + 'mo';
  }

  const typeLabels = {
    thought: 'thought', note: 'note', event: 'event',
    task: 'task', contact: 'contact', home_item: 'home'
  };

  // ── Load tags ────────────────────────────────────────────────────────────

  async function loadTags() {
    try {
      const res = await fetch('/api/tags');
      if (!res.ok) throw new Error();
      allTags = await res.json();
      dotEl.className = 'status-dot on'; connEl.textContent = 'connected';
      footerInfo.textContent = allTags.length + ' tags';
      renderTagList();
      // Auto-select from hash
      const hash = location.hash.slice(1);
      if (hash && allTags.some(t => t.tag === hash)) selectTag(hash);
    } catch {
      dotEl.className = 'status-dot err'; connEl.textContent = 'offline';
      tagListEl.innerHTML = '<li style="color:var(--text-3);font-size:11px;padding:8px;">could not reach api</li>';
    }
  }

  function renderTagList(filter) {
    const f = (filter || '').toLowerCase();
    const filtered = f ? allTags.filter(t => t.tag.includes(f)) : allTags;
    tagListEl.innerHTML = '';
    if (!filtered.length) {
      tagListEl.innerHTML = '<li style="color:var(--text-3);font-size:11px;padding:8px;font-style:italic;">no tags found</li>';
      return;
    }
    filtered.forEach(t => {
      const li = document.createElement('li');
      li.className = 'tag-item' + (t.tag === activeTag ? ' active' : '');
      li.innerHTML = '<span class="tag-name">' + esc(t.tag) + '</span><span class="tag-count">' + t.count + '</span>';
      li.addEventListener('click', () => selectTag(t.tag));
      tagListEl.appendChild(li);
    });
  }

  tagFilterEl.addEventListener('input', () => renderTagList(tagFilterEl.value));

  // ── Select tag ───────────────────────────────────────────────────────────

  async function selectTag(tag) {
    activeTag = tag;
    location.hash = tag;
    renderTagList(tagFilterEl.value);
    wikiMainEl.innerHTML = '<div class="wiki-empty">loading&#x2026;</div>';

    try {
      const res = await fetch('/api/tags/' + encodeURIComponent(tag));
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      renderTagPage(data);
    } catch (err) {
      wikiMainEl.innerHTML = '<div class="wiki-empty">error: ' + esc(err.message) + '</div>';
    }
  }

  // ── Render tag page ──────────────────────────────────────────────────────

  function renderTagPage(data) {
    let html = '';

    // Header
    html += '<div class="tag-header"><h1>' + esc(data.tag) + '</h1>';
    html += '<span class="item-count">' + data.items.length + ' item' + (data.items.length !== 1 ? 's' : '') + '</span></div>';

    // Related tags
    html += '<div class="related-row">';
    if (data.related_tags.length) {
      html += '<span class="related-label">related</span>';
      data.related_tags.forEach(rt => {
        html += '<span class="related-chip" data-tag="' + esc(rt.tag) + '">'
          + '#' + esc(rt.tag)
          + ' <span class="co-count">' + rt.co_occurrence + '</span></span>';
      });
    }
    html += '</div>';

    // Group items by type
    const groups = {};
    data.items.forEach(item => {
      const t = item.content_type;
      if (!groups[t]) groups[t] = [];
      groups[t].push(item);
    });

    // Render each group
    const typeOrder = ['thought', 'note', 'event', 'task', 'contact', 'home_item'];
    typeOrder.forEach(type => {
      if (!groups[type]) return;
      const items = groups[type];
      const label = typeLabels[type] || type;
      html += '<div class="section-divider"><span>' + label + 's<span class="type-count">(' + items.length + ')</span></span></div>';
      items.forEach((item, i) => {
        html += renderItem(item, i, null);
      });
    });

    // Suggested connections
    if (data.suggested.length) {
      html += '<div class="suggested-section">';
      html += '<div class="section-divider"><span>suggested connections</span></div>';
      html += '<div class="suggested-note">Items semantically related to #' + esc(data.tag) + ' but not yet tagged with it</div>';
      data.suggested.forEach((item, i) => {
        html += renderItem(item, i, item.similarity);
      });
      html += '</div>';
    }

    wikiMainEl.innerHTML = html;

    // Bind click events for related tag chips
    wikiMainEl.querySelectorAll('.related-chip').forEach(chip => {
      chip.addEventListener('click', () => selectTag(chip.dataset.tag));
    });

    // Bind click events for items
    wikiMainEl.querySelectorAll('.wiki-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = el.dataset.idx;
        const source = el.dataset.source;
        let item;
        if (source === 'suggested') {
          item = data.suggested[idx];
        } else {
          item = data.items[idx];
        }
        openModal(item);
      });
    });
  }

  function renderItem(item, idx, similarity) {
    const source = similarity != null ? 'suggested' : 'items';
    // For suggested items, idx is relative to suggested array; for items, relative to full items array
    const dataIdx = source === 'suggested' ? idx : findItemIndex(item);
    let html = '<div class="wiki-item" data-idx="' + dataIdx + '" data-source="' + source + '" style="animation-delay:' + (idx * 25) + 'ms">';
    html += '<div class="item-meta">';
    html += '<span class="item-type">' + esc(typeLabels[item.content_type] || item.content_type) + '</span>';
    html += '<span class="item-time">' + relTime(item.created_at) + '</span>';
    if (similarity != null) {
      html += '<span class="item-sim">' + Math.round(similarity * 100) + '% similar</span>';
    }
    html += '</div>';

    const displayText = item.title || item.content || '';
    html += '<div class="item-content">' + esc(displayText) + '</div>';

    if (item.tags && item.tags.length) {
      html += '<div class="item-tags">';
      item.tags.forEach(t => { html += '<span class="item-tag">' + esc(t) + '</span>'; });
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  // We need to track item indices for the click handler
  let _currentItems = [];
  const _origRenderTagPage = renderTagPage;
  renderTagPage = function(data) {
    _currentItems = data.items;
    _origRenderTagPage(data);
  };

  function findItemIndex(item) {
    return _currentItems.findIndex(i => i.id === item.id);
  }

  // ── Modal ────────────────────────────────────────────────────────────────

  const modalOverlay = document.getElementById('modal-overlay');
  const modalType    = document.getElementById('modal-type');
  const modalTime    = document.getElementById('modal-time');
  const modalSim     = document.getElementById('modal-sim');
  const modalContent = document.getElementById('modal-content');
  const modalTags    = document.getElementById('modal-tags');
  const modalClose   = document.getElementById('modal-close');

  async function openModal(item) {
    modalType.textContent = typeLabels[item.content_type] || item.content_type;
    modalTime.textContent = relTime(item.created_at);
    modalSim.textContent = item.similarity != null ? Math.round(item.similarity * 100) + '% match' : '';
    modalContent.textContent = item.content || item.title || '';
    modalTags.innerHTML = (item.tags || []).map(t => '<span class="item-tag">' + esc(t) + '</span>').join('');
    modalTags.style.display = item.tags && item.tags.length ? 'flex' : 'none';
    modalOverlay.classList.add('open');
    document.addEventListener('keydown', onModalKey);

    // Fetch full content for thoughts/notes/events
    if (['thought', 'note', 'event'].includes(item.content_type)) {
      try {
        const resp = await fetch('/api/thoughts/' + item.id);
        if (resp.ok) { const full = await resp.json(); modalContent.textContent = full.content; }
      } catch (e) { /* keep preview on error */ }
    }
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
    document.removeEventListener('keydown', onModalKey);
  }
  function onModalKey(e) { if (e.key === 'Escape') closeModal(); }
  modalClose.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

  // ── Hash navigation ──────────────────────────────────────────────────────

  window.addEventListener('hashchange', () => {
    const hash = location.hash.slice(1);
    if (hash && hash !== activeTag) selectTag(hash);
  });

  // ── Init ─────────────────────────────────────────────────────────────────

  loadTags();
</script>
<script src="/nav.js"></script>
</body>
</html>
